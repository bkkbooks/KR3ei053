body:
  text: 卷八醫方類湯飲丸散方丹湯類生化湯當歸八錢酒洗川芎四錢乾薑四分炙甘五分桃仁十粒去皮尖研滋榮易産湯人參一錢川芎一錢當歸三錢茯苓八分炙甘八分陳皮五分腹皮八分白朮八分黃芩八分懷生二錢益母草三錢升舉大補湯白朮二錢當歸二錢懷生二錢人參二錢炙甘四分陳皮四分川芎一錢黃耆一錢麥冬一錢黃耆三分黃柏三分荊芥五分羌活五分防風五分升麻五分白芷五分滋榮益氣復神湯川芎一錢當歸二錢炙甘四分懷熟三錢黃耆一錢人參二錢白朮一錢棗仁一錢茯神一錢柏子仁一錢益智一錢陳皮三分麥冬一錢五味子十粒蓮子八個圓眼肉八個棗引六和湯治傷寒暑霍亂吐瀉兩腳轉筋四肢厥冷陳皮四分藿香四分甘草四分半夏二分杏仁十粒白扁豆二錢炒木瓜一錢砂仁五分茯苓八分薑棗引水煎如虛人加人參一錢又方無陳皮竹葉有香薷厚朴若熱渴瀉加黃連補中益氣湯人參一錢黃耆一錢五分甘草一錢白朮一錢歸身五分柴胡五分升麻三分陳皮五分去白保真湯黃耆二錢當歸二錢天冬二錢知母二錢懷生一錢懷熟二錢人參一錢白朮一錢麥冬一錢白芍一錢杞子一錢茯苓八分川芎八分甘草四分五味子十粒地骨皮四分黃柏六分加元棗引十全大補湯人參肉桂川芎當歸熟地芍藥茯苓白朮黃耆炙甘每服一兩加棗二枚薑二片水煎服當歸六黃湯當歸黃柏黃芩黃連生地熟地黃耆每服五錢小兒減半鯉魚湯白朮五分茯苓四錢當歸三錢芍藥三錢鯉魚一尾重約一二斤去鱗腸水煎加橘皮少許生薑七片用水四盞取汁煎半加四味藥煎七分溫服水腫未消再製服四君子湯人參白朮茯苓甘草四物湯當歸川芎芍藥熟地二陳湯半夏陳皮白茯苓等分甘草減半麻黃湯桂枝麻黃根杏仁甘草香薷湯治伏暑口乾咽燥厚朴三兩扁豆三兩香薷一兩用水一碗入酒少許煎後冷服加黃連名謂黃連香薷飲六君子湯即四君子湯加半夏陳皮犀角地黃湯犀角二錢三分解心熱生地一兩五錢涼心血白芍二錢丹皮二錢二分二味酸入肝寒勝熱肝是心母以術生心酸寒治之正氣湯治陰虛有火盜汗黃柏一錢炒知母一錢炒甘桔湯治少陰咽痛甘草二兩桔梗一兩飲類丹溪安胎飲人參二錢白朮二錢當歸二錢川芎八分黃芩八分陳皮三分懷熟地二分紫蘇四分甘草四分砂仁三分薑棗引安榮飲人參二錢白朮二錢當歸二錢麥冬一錢通草一錢茯苓皮一錢甘草四分燈心五分寧肺止嗽飲天冬二錢桔梗五分紫蘇五分知母二錢甘草四分寒嗽加桑白皮八分痰多加橘紅四分竹瀝汁薑汁熱渴加黃芩八分虛嗽加紫菀一錢冬花六分喘夜多嗽加麻黃五分虛損嗽加木瓜一錢竹瀝薑汁心胸不舒加貝母一錢百合一錢補母固胎飲白朮二錢當歸二錢陳皮五分紫蘇五分甘草五分懷熟二錢人參三錢條實黃芩八分砂仁三分益母草五分棗引七寶截瘧飲常山一錢五分酒炒陳皮一錢厚朴一錢薑製草果仁一錢檳榔一錢青皮一錢甘草五分烏梅一個薑引十味治瘧飲白朮一錢半夏一錢香薷一錢五分藿香五分陳皮五分豬苓八分澤瀉八分白扁豆八分柴胡一錢木通五分元胡索飲莪朮三稜當歸紅花元胡索童便酒煎丸類六味地黃丸熟地八錢山藥四錢山萸肉四錢澤瀉三錢茯苓三錢丹皮三錢補陽宿鳳丸白朮一兩黃耆一兩茯苓一兩川芎一兩五味子一兩大甘草一兩白芍一兩巴戟一兩破故紙一兩萸肉一兩天門冬一兩肉蓯蓉一兩川牛膝一兩廣皮一兩知母一兩杜仲一兩厚黃柏一兩懷山藥一兩虎骨一兩生地二兩熟地二兩麥冬二兩人參二兩當歸二兩杞子二兩用十年陳線雞一隻宰淨蒸熟去皮油取肉骨焙燥合諸藥煉蜜為丸先天大造丸治骨蒸癆熱紫河車一具人參一兩當歸八錢麥冬八錢銀柴胡六錢生地二兩胡連五錢山藥一兩石斛八兩酒蒸杞子一兩黃柏七錢酒蒸另將門冬地黃先搗如泥河車蒸熟亦搗後入諸藥末均為丸若焙河車末煉蜜為丸加味益母丸白朮一兩益母草四兩條芩八錢蜜丸孕婦諸症並可治之亦可作大丸如彈子大清湯送下孕內常服一丸甚好多氣人加木香三錢弱人安胎飲送化胸膈不舒加紫蘇二錢陳皮二錢香連丸黃連二十兩吳萸十兩同炒赤色去吳萸俱為細末醋糊丸梧子大每二十丸為率又一方加連肉補陰大造丸河車一具人參一錢五分歸身二兩天冬一兩三錢五味子五錢山藥八錢杜仲七錢薑炒牛膝一兩酒浸黃柏七錢鹽水炒熟地二兩柴前梅連丸柴胡二錢前胡二錢胡黃連二錢烏梅肉二錢豬脊髓一條豬膽一個韭白十根長一寸前四味為末另將脊髓豬膽韭白同搗如泥入童便一盞熬如稀糊入葉末再搗為丸緑豆大每服三四十丸清湯送化安神丸即安寢丸治憂愁思慮傷心不食黃連一兩二錢硃砂一兩水漂當歸五錢懷生五錢酒洗炙甘五錢清氣化痰丸治痰火通用陳皮一兩去白杏仁一兩去皮尖枳實一兩麵炒黃芩一兩酒炒栝蔞仁一兩去油膽星一兩五錢製半夏一兩五錢薑汁丸散類天仙藤散天仙藤酒略洗香附六分炒陳皮四分甘草五分烏藥七分木瓜一錢紫蘇五分薑皮三分羚羊角散獨活羚羊角棗仁五加皮薏米仁防風川芎當歸茯神杏仁木香甘草失笑散治血痛生蒲黃五靈脂各等分研末醋調服元胡索散肉桂一錢胡索一錢酒炒為末逍遙散當歸二錢白芍一錢白朮一錢五分茯苓七分柴胡一錢丹皮七分黑山梔七分炙甘四分五皮散茯苓皮大腹皮五加皮地骨皮生薑皮催生如神散即黑神散百草霜即鍋底煤香白芷滑石等分芎歸湯送下二錢須兒頭已頂産門方可服平胃散治濕常用蒼朮陳皮厚朴甘草薑棗引方類丹溪醫案大補方人參三錢白朮五錢川芎一錢當歸三錢芍藥一錢茯苓一錢澤瀉八分厚朴五分陳皮四分紫蘇四分大腹皮六分蘿蔔子六分木香七分補母壽子方人參一錢弱人加至三錢當歸三錢白朮二錢熟地二錢川芎八分條芩一錢陳皮四分紫蘇四分虛肥人去白朮甘草四分加黃連五分棗引乳癰方即神仙回膿散蒲公英天花粉金銀花連翹白芷甘草若是吹乳加防風久破爛加人參黃耆不加引酒水各半煎飽服丹類煎膏藥方丹治一切癰疽惡毒諸瘡神效元參五錢苦參五錢黃芩五錢杏仁五錢白芷五錢大黃五錢金銀花五錢天花粉五錢連翹五錢歸尾一兩赤芍五錢丹皮五錢黃耆五錢每一料用真麻油一斤其粉心半斤將各藥挫片入油浸二宿文武火煎以藥純黑色為度去渣淨然後研細粉心入藥用桃枝不住手攪滴水成珠不散為度再加阿魏末一錢名阿魏膏摻藥方丹血竭二錢阿魏三錢乳香三錢沒藥三錢龍骨三錢赤石脂三錢為末極細摻膏藥內
