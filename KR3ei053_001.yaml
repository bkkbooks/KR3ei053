front:
  text: 周序胎産一科存亡系乎呼吸利病關乎終身於醫道尤為切要學醫者尤不可不講明而切究之也先世名醫如朱丹溪薛立齊諸公論之綦備然求其操乎至要簡而易從者則莫若胎産指南一書是書原序云出自單南山其人里居名字已不可考昔越郡錢升穟先生得此祕本而精子胎産之科名冠一郡乾隆癸巳吾鄉伊學曾先生在寧郡道暑得此書於紹友婁君之手遂亦以胎産馳名於吾邑閲歷四五十年以其所經驗者筆之於書示後人當神明於法之中不容偏執名曰女科醫案凡七卷然先生奉指南為枕中祕未嘗輕以示人即戚友亦不得而知也先生歿後其甥明經蔡益亭先生始得抄而傳之歐君孔章少受舉業於益亭悅是書手為抄録久欲梓行於世以廣厥傳猝猝未果今歲秋纂修宗譜事將告竣其譜師為天台陳君彩盅知君欲為是舉益縱恿之遂囑陳君付諸剞劂氏而以伊先生之醫案附焉昔唐晉公致仕家居嘗手抄集驗良方梓行於世宋范文正公亦然且其言曰不為良相願為良醫夫以二公福世壽民之事業何可勝道而乃眷眷焉垂意於醫誠以醫雖小道而其利濟於世者為不淺也歐君雖不敢與二公頡頏上下而其梓行是書之意猶二公也豫嘉其意為述其緣起如此或曰凡星相醫卜之類苟有祕本不宜宣泄若梓而行之即不靈驗是說也殆與兒童之見無異而適為吝者之所藉口固大方家所竊鄙也烏足辨哉烏足辨哉時咸豐六年菊月葵圃周丹忱撰原序單南山不知何許人也豫總角時聞升穟錢先生胎産為吾浙國手不知其祕傳得之於南山也其中胎前悉以丹溪安胎飲為主産後悉以生化湯為主隨症加減按病論治症既悉備論極詳明使讀者洞如觀火以之救危急起沉疴靡不應手取效如鼓應桴即不知脈者對症檢方依法調治自有徑轍可循不致惘然坐務實再也之青囊濟世之靈藥也豫因多病博覽醫書汗牛充棟不可勝紀而胎産一科簡約明允無出其右是誠祕本也今將其中稍有缺略者更為增補以便觀覽仍注增補不敢混真其前後次序錯亂者更為移改如産忌食物鄉俗十弊用藥十誤等條原本俱載本末八卷內今類入卷五禁忌藥物內以便查覽是本也先伯祖素園公於康熙丙寅年得於荊襄道署其素園公手録原本大兄殿揚攜遊湖海存亡不得知矣豫敘其巔末凡我子孫珍藏熟玩切不可視為尋常等靈珠於魚目棄琳琅同碔石也其越裳氏來朝三年至周迷其歸路周公作指南車賜之因以還國今讀此本而病症瞭然固無異於指南也因以名書其聆之毋忽原本撰名失載時在咸豐丙辰五月哉生明天台鳴山陳彩盅敬録於四明象之西滬歐中憲第
