body:
  text: 卷三臨產須知異症異症調護法異症醫方難產調護增補臨產須知凡產論病產後脈辨異症調護法凡產育之難者皆因坐產太早用力太過遂有橫生倒產之危且臍腹疼痛之初自兒身才轉多未順且宜慎之一兒身未順生路未正產婦用力一逼令兒偏生或左傾雖兒逼門而不成下但云兒已露頂非頂也或左右額角也用力一逼即下若是頭之後骨逼在穀道兒露頂未正當令穩婆熟手急於穀道輕推頭正然後用力一逼兒下此全在穩婆之良醫藥為次也若胎水未落痛者開口危甚一兒先露手足以鹽塗足底急搔之並以鹽塗母腹上又以小絹針於兒手足以針入一二分以鹽擦其上輕輕送入兒痛驚轉一縮當即回順針刺之法防兒痛上奔母命有礙異症醫方治橫生逆產方伏龍肝即灶中心土多年紅者佳研細末酒調下一錢其藥兒頭戴出妙治橫生倒產方蛇蛻一條全蠶蛻紙一張新瓦瓶中鹽泥封固燒存性為末煎乳香湯送一錢二服即下治橫倒先露手足方阿膠炒滑石黃葵子每服四錢水煎服催生兔腦丸治生理不順橫逆難產神效臘月兔腦髓母丁香一錢為末乳香一錢另研麝香一分用兔腦搗為丸如芡實大陰乾紙密封溫酒送一丸男左女右手握藥丸娩下霹靂奪命丹治臨產未產時目翻口噤面黑唇青口中吐沫子母命在須臾若兩臉微紅子死母活急用此方蛇蛻瓶煅蠶蛻紙燒一錢發灰一錢乳香五分酒送佛手散即歸芎湯當歸川芎酒水煎催生如神散須候兒頂產門方可服即黑神散百草霜即鍋底墨香白芷滑石等分研末芎歸湯送二錢加味益母丸妊婦諸症可服益母草四兩白朮一兩條芩八分蜜丸彈大清湯送孕常服一丸甚好多氣人加木香三錢弱人安胎飲送化胸膈不舒暢加紫蘇二錢陳皮二錢作細丸亦可加參芎歸湯臨盆胞水來而交骨不開停產宜服大料加參芎歸湯以助血氣旺自然即開分娩川芎四錢當歸一兩人參三四兩甘草一錢益母草一錢水煎連服二三帖如有合成益母丸用前四味煎湯送化一丸如服兩三帖後不開加敗龜板一兩醋炙亂髮一團生育婦發燒灰加味生化湯治子宮不收產戶不閉交骨不開人參二錢白朮一錢黃耆一錢川芎一錢炙草四分當歸二錢升麻八分子宮不收再加半夏八分北五味十五粒酸以收之芍藥八分醋炒補而升之以上三症皆元氣不足之甚娩後患此必先服生化湯消血塊繼服加參生化湯三症交骨不開補以開之子宮不收補以收之產門不閉酸以斂之胞衣不下詳卷六二十九症第三條難產調護俱是臨盆七日內諸事產畢未可上床令人扶住從心下輕輕按揉至臍腹間日五六次此後雖睡時時揉之惡血不滯腹中又用小衣服烘熱溫之雖暑月不可去單被腹寒則血塊不行且作痛產兒下地即服生化湯二帖共三煎去百病兒下若胎衣不下要善護母下部冬月用火於被中腹中用熱衣溫之又服生化湯益母丸諸下胎衣丸產母虛甚須燒磚石秤錘入醋使氣至鼻以防血暈兒下地即服生化湯一帖如肚飢甚可服白粥一盞不可太飽過一時又服生化湯如未欲食必連服生化湯二帖共三煎始吃飯甚好才產不得過與酒飲酒能散惡血入四肢老年作痛且臟氣虛不勝酒力致神昏七日內切不可洗下部七日外方可洗就床坐洗滿月後方可梳頭洗澡一百日內不可勞力過度冬末春初天色凝寒宜密閉產室四圍置火常令暖氣和燠而且下部衣服不可去俾可免胎寒血結以致難產停胞也日向太陽夜向太陰祝畢燒灰用滾水吞之無不靈效不可多傳人多傳則不靈矣增補臨產須知萬密齋先生女科產婦以血為主氣為輔血濡氣行子宮滑溜生理順易子猶魚也胞漿猶水也水行魚行水去魚止可知產難皆血少氣滯之故加減五苓散主之又名催生如聖散白朮茯苓豬苓澤瀉肉桂車前木通枳殼檳榔甘草各一錢滑石末二錢燈心四十九寸長流水煎如胞漿乾澀者加川芎當歸尾生地香附如飲食少中氣不足者加人參子死腹中辨妊婦三四日不產胎死腹中其母唇舌俱紅者母子無事唇青舌紅母死子活唇紅舌青母活子死唇舌俱青奪命丹主之蛇蛻全者一條新瓦上存性金銀箔各七張大母丁香五錢另研男子亂髮一錢燒存性馬鳴蛻一錢即破故紙燒黑鉛二錢五分水銀七分先將鉛溶化入水銀急炒結成沙子傾出另研千里馬鼻即舊草鞋鼻七個燒灰於靜室中修合勿令婦人雞犬見各研為末和勻用獖豬心血為丸桐子大每服二丸長流水送灌盤腸生調治法並醫方產婦臨盆腸先出盤露於外子隨後生生後而腸不即收由平日氣虛不能斂束血熱易於流動下元不固關鍵不牢致有此苦救治之法於子下衣來之後令產婦仰臥先將母腸溫水洗淨惹帶之物然後托起輕輕送入推而上之令產婦兩足夾緊穀道其腸自收上也或取草麻四十九粒去殼搗攔敷在頂心待腸收盡急去之次也又用冷水和醋令人噴面一噴一收以漸收之又其次也欲免其苦者宜於次後無孕時服地黃丸加五味子一兩桂心一兩以固下元之關鍵有孕後多服胡連丸胡連丸白朮一兩條芩四兩蓮肉二兩去心砂仁一兩炒炙甘草一兩研末山藥五兩打糊為丸米飲下加人參以補其氣兼服三補丸以涼其血黃柏黃連黃芩炒等分蜜丸白湯下於八月之時再服八物湯加訶子瞿麥粟殼蜜炒服十餘帖庶可免矣產子氣絕不啼救法臨產之母護痛傾側兩足不開扭夾兒頭氣不得伸故兒悶絕謂之寤生救法自胎衣來勿斷臍帶急用小鍋燒水以胎衣置湯中頻用溫水洗帶須臾氣暖入腹兒氣即回啼聲出矣若倉卒斷其腸不可救也產後生化湯論服法產後血氣暴虛欲補之則恐惡露停滯欲攻之又恐元氣有虧惟行中帶補化舊生新方始萬全也世之治產者往往用四物湯竅謂地黃性寒滯血芍藥酸寒無補非治產之良劑也惟生化一湯預時制下候胎衣一破速煎俟兒下即服相繼服二三帖使下焦血塊速化新血驟長自無厥暈且產婦服一帖精神漸增二帖陰血頓旺並去宿瘀所以有生化之名也凡產論病凡病生於血氣之衰脾胃之虛而產後氣血脾胃之虛衰尤甚焉是以丹溪先生論產後必以大補氣血為先雖有他症以末治之此三言已盡醫之大旨若能擴充其方用藥可以無失矣夫產後憂驚勞倦氣血暴虛諸症乘虛易入如有氣無專耗散有食無專消導熱不可用芩連寒不可用桂附寒則血塊凝滯熱則新血流崩至若虛中外感見三陽表症似可汗也在產後而用麻黃慮有亡陽之患見三陰里證似可下也在產後而用承氣則重亡陰血耳聾脅痛乃腎虛惡露之停休用柴胡譫語汗出乃元弱似邪之症毋解胃實厥逆陽氣之衰雖分寒熱非大補不能回陽而起弱痓因陰血之虧毋論剛柔非滋榮不能舒筋而活絡又如乍寒乍熱發作有期症類瘧也若以瘧治遷延難愈神不守舍言語無論病似邪也若以邪治危亡可待去血多而大便燥熱肉蓯蓉加於生化非潤腸承氣之能通患汗多而小便短澀六君子倍加參耆必生津而津可利加人參生化頻服能救產後之危長生活命屢用可蘇絕谷之人㿗疝脫肛多是氣虛下陷補中益氣之方口噤拳攣乃因血燥類風加參生化之劑產戶入風而痛甚宜服羌活養榮產門傷冷而不閉五味倍參生化怔忡驚悸生化合定志似邪恍惚安神助脾歸脾因氣而滿悶虛煩生化湯加木香為佐因食而噯酸惡食六君子入神麯為良蘇木蓬稜大能破血青皮枳殼散脹消滿一應耗氣破血之劑汗吐攻下之方止可施於少壯豈宜用於胎產大抵新產之後須問惡露如何若塊痛未消未可遂加耆朮腹中痛止補中益氣無疑至若亡陽脫肛氣虛喘促頻進加參生化是從權也又有陰亡大熱血崩厥暈速進生化原方乃急救也凡附生死之奇術須因病以用藥欲俯仰之無愧用存心以愛物茲雖未盡產症之詳皆援近治之驗為拘未必無小補云產後脈辨叔和曰產後寸口洪疾不調者死沉微附骨不絕者生又曰沉小滑者生實大緊弦急者死朱丹溪曰胎前脈宜洪數既產而脈仍洪數者死又曰胎前脈細小產後脈洪大多死產後之脈貴虛濟生產經曰胎前之病其脈貴實產後之病其脈貴虛胎前則順氣安胎產後則扶虛消瘀此其要也產脈辨生死之法脈要曰欲產之脈必見離經或沉細而滑夜半覺痛來朝日中必娩新產脈緩滑為吉若實大弦急近乎無胃凶危之候或寸口疾滑不調惡症立見惟宜沉細附骨不絕雖劇無恙
