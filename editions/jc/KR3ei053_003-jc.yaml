body:
  text: 卷一胎前辨論諸症保安胎論凡孕婦脾胃旺而血氣充則胎安而正產子精神而壽曷嘗用藥以調氣血安胎耶若稟不足而氣血衰脾胃弱飲食少則虛症百出孕成數墮或產子不壽必資藥力以助母安胎壽子也是以丹溪先生刪定安胎飲之良方治孕婦元氣虛弱胎氣不安飲食不美或腹痛腰疼隨症加減以治胎前諸症後開隨症加減二十餘方皆可按方取用夫血精會凝而成孕精氣蒸胃而嘔逆血少肝虛如愛酸物胃氣受傷厭阻飲食若人素弱嘔阻本方量加橘紅若稟厚吐逆再加竹瀝薑汁下血不止名胎漏小腹墮痛名胎痛胎漏宜涼須加生熟地黃胎痛宜溫少加帶殼砂仁至若僕跌動胎下血膠艾宜加怒氣胎衝上逆木香為先小便短澀成淋瀝乃子淋之症安榮不應本方宜小便帶血流於脬是膀胱之熱逍遙入炒山梔子腫症多面目虛浮而肢體有水氣全生白朮堪醫子煩症則心驚膽怯而時加煩悶安胎竹葉無疑天仙藤散治足指縫出水病名子氣虛人多加參術羚羊角散療項強筋搐拳攣病名子癇痰多加竹瀝參歸至如脾胃氣虛而胎壓尿胞則臍腹脹而小便淋閉安胎飲服法宜探吐升提又如脾虛氣弱而轉運舒遲則飲食停滯而腹脹嘔吐安胎力緩加參平胃調和又若胸滿腹脹便秘遍身浮腫名曰胎水之不利得用鯉魚湯若脾胃氣虛佐以四君五皮又若胎氣上攻心腹脹滿作痛名曰子懸之候必用紫蘇湯若食少晡熱兼以加味逍遙若腹大子滿肥而氣壅束胎難緩臨月欲活血而散滯達生散宜嘗柴前梅連丸治骨蒸之勞熱當歸六黃湯療盜汗之晡熱孕成數墮因母血弱不能分蔭其胎本方預服可保滿期生子無氣由母氣虛僅可資榮於己安胎之方必須月服老夫得少婦須寡欲以候經期壯陽遇衰陰必頻藥以助胎力其人愛精重施生於精神有壽狂陽妄泄育子清寡無神此造化必然之理後人胤嗣當鑑大抵孕婦素弱又欲分血氣以蔭胎自然虛症百出是以丹溪先生安胎方以補為主佐以順氣清涼參朮黃芩乃安胎之聖藥歸芎懷熟實補血之良劑佐以蘇葉陳皮可為常服方也夫孕成六月之前其胎尚未轉運茯苓性降不宜多用黃耆肥胎豈可常加香附雖胎喘所需無補虛人反害砂仁可止嘔定痛多加則動血行胎歷考丹溪安胎之論不過數首安胎之方不過再四若能神明加減則十全八九誠為後學之準繩也胎症名目辨諸家巧立病名竹葉湯以治子煩安榮散以治子淋天仙藤散以治子氣之方羚羊角散治子癇之病子腫症用全生白朮方子懸症用紫蘇葉方胎前之症非止數名總因孕婦氣血虧虛或有外感致生諸症而胎不安豈胎有病母之理也子煩淋腫等症名乃後人巧立之名形容胎前之病耳愚意隨症治方多尊丹溪先生安胎散加減以治毫無誤失補母壽子論凡屢產生子無氣及育而不壽者以父母氣血不足故也夫人愛精重施則髓滿骨堅又得血氣壯盛之婦為配生子自精神而有壽若壯陽弱婦成孕則母無餘血蔭胎必借藥補以培胎元斯生壽子又若弱女衰翁必須異床寡欲藥味助神算候經期固精方施斯乾元資始之本實坤元資生之源厚也經曰因而和之期為聖度若不遠帷薄則相火易動雖不交會亦暗流損泄多矣陰平陽秘精神乃治陰陽離決精神乃絕後立二方實補先天之不足孕成後必宜多服以全胎元生子必精神有壽經驗極多故錄示人補母壽子方治屢產生子無氣或育而不壽又補氣血虛弱孕成不安或得孕數墮照方每月服十五貼弱甚者每日一帖大益胎而分娩易又生子精神有壽經驗良方也人參一錢如弱人用二錢當歸二錢白朮二錢川芎八分懷生地自蒸二錢條芩二錢柴蘇四分陳皮四分甘草四分若虛弱人陳皮去白再加黃連五分棗三枚水煎服又加減法脾胃弱常泄瀉加蓮子十枚帶殼砂仁三分減地黃多怒而瀉加木香二分口常燥渴加麥冬一錢怔忡驚悸加棗仁一錢益智一錢天員十個先天大造丸兼服助胎尤妙紫河車一具壯盛頭胎者佳如新鮮者挑去血筋和酒漿煮爛入藥搗勻山藥一兩人參一兩五錢歸身二兩五錢麥冬一兩五味子五錢黃柏八分久患瀉人不可用天冬一兩懷生地二兩脾胃弱常瀉人減地黃用白朮一兩各為末煉蜜丸先將地黃麥冬蒸搗如泥次下諸藥末又搗千餘下丸如綠豆大空心清湯下百丸忌蘿蔔不可食香附等耗氣種子方不可服辨時人妄立種子方多用香附為主大損氣血服久則少力腰疼及成痼疾絕胎間有服交加散而偶得子者因少壯婦多恚怒服之抑氣諸榮幸中耳豈可視為良方珍服圖嗣乎且無子多由少血不能攝充或屢墮胎損血及經行作痛或子宮空虛之故欲求嗣者須修補陰大造丸三四料以助陰血頭胎功效甚奇經行久痛人丸內用牛膝一兩元胡索五錢以調之得孕屢墮者成胎後每月必服丹溪安胎飲十數帖則可保矣補陰大造丸治血虛氣弱人不能攝充精元成胎或屢墮胎及生子不壽者若孕後虛熱盜汗食少帶多並宜服紫河車一具人參二兩當歸二兩天冬一兩三錢北五味五錢杜仲七錢姜炒山藥八錢牛膝酒炒一兩黃柏鹽炒七錢懷生地自蒸二兩合法丸服俱同先天大造丸事林廣記瘦胎三方不可服辨時醫用枳殼香附等耗氣藥立斂胎易產方名非無見也仿古方士進湖陽公主枳殼瘦胎方義遂增幾味耗氣藥品巧立方名使人信而服之惑世害人久矣蓋方士因湖陽公主居養而形厚食膏粱而胎肥過期難產特進此方亦幸中耳其胎之損元不壽不責咎也常人豈可概服乎夫孕至九個月胎形全具一母之氣血蔭胎兩用正宜服藥補之母弱者藥培於他月若復耗之則母救己不贍奚有餘血分蔭其胎是以餓損胎元日漸伶仃瘦弱無斂胎易產之效有虧元損壽之害其孕母血氣亦虧損多至臨盆艱澀娩後血暈發厥危疾皆由所致人不知也婦人良方所載無憂散保氣散神寢散俱不可服滋榮易產湯凡孕婦至九個月服之有益人參一錢川芎一錢當歸三錢茯苓八分甘草四分陳皮五分大腹皮八分白朮八分黃芩八分益母草二錢懷生地二錢水煎服達生散孕婦臨月服之活血去滯虛者加參又一方有芍藥人參尤佳此方秘本無增入大腹皮薑製一錢五分甘草一錢五分蔥葉三根黃楊腦七個春加川芎防風夏加黃芩五味秋加澤瀉冬加砂仁或木通胎動加阿膠上氣加紫蘇地黃性急加柴胡口渴加麥冬黃芩衰翁弱女求嗣辨凡男子八八六十四而天真竭過數而能生子者稟原異於常也女子七七四十九而天癸斷過期而能有孕者衝脈旺而血氣充也然衰年欲昌嗣續各有道焉衰翁必須異床息火絕無暗滿流泄藥味助神真固以候經期種子斯乾元資始之本厚也弱婦成孕必須月服固胎飲二十餘劑以培衰弱天真斯坤元資生之源充也補弱夫弱婦不足前先天二方及補湯丸經驗極多補陽宿鳳丸大補年老人北五味白朮黃耆茯苓炙川芎甘草白芍巴戟破故紙山萸肉天冬蓯蓉川牛膝廣皮懷山藥黃柏知母杜仲虎骨以上十九味各一兩懷生地四兩熟地四兩麥冬四兩人參四兩當歸三兩甘枸杞三兩用十年陳線雞一隻蒸熟去皮油取肉骨焙燥合諸藥煉蜜丸氣血虛服之甚有益婦人受胎月令婦人受胎一月形如露珠乃太極動而生陽天一生水謂之脛足厥陰肝脈主之經水即閉飲食稍異二月如桃花瓣乃太極靜而生陽地二生火謂之腪足厥陰膽脈主之若吐逆減食名曰惡阻有孕明矣或偏嗜一物乃一臟之虛如愛酸物乃肝經只能養胎而虛也三月如清鼻涕先成鼻與雌雄二器乃分男女手少陰相火所主胎最易動四月始受水精以成血脈形象具手足順成手少陽脈所至五月始受火精筋骨四肢已成毛髮始生足太陰脈所主六月始受金精以成筋口耳皆成足陽明脈所主七月始受木精以成骨遊其魂能動左手手太陰脈所主八月始受土精以成皮膚九竅皆成遊其魄能動右手手陽明脈所主九月始受石精百節畢備三轉其身足少陰脈所主十月神氣備足乃生足太陽脈所主惟手少陰太陽所主者其主之官無為而已墮胎須防三五七月宜服清熱涼血安胎之藥女子陰類也以血為主上應太陰下應海潮一月一行故謂之月水月信月經經者常也天癸天一生水也或先或後或通或塞皆病也復有變常而古人未言及者不可不知有行期只吐血衄血或眼目出血者是謂倒經有三月一行者是謂季經有一年一行者是謂避年有一生不行而受胎者是謂暗經有受胎之後月月行經而生子者是謂盛胎或受胎每月血大下而胎不隕者是謂漏胎女子二七天癸至七七天癸絕其常也有女子十二三而生者其變也醫者亦宜留心也胎前二十七症醫方丹溪安胎飲一治孕成後胎氣不安或腹微痛或腰間作痛或飲食不美孕至五六個月並宜服之白朮二錢當歸二錢條芩八分川芎八分人參一錢陳皮四分懷生地二錢自蒸紫蘇四分甘草四分砂仁三分薑棗引水煎二孕婦元氣不足倦怠或胎動不安或身微熱減食並服加味安胎飲如腰疼腿痛必一日二三帖可安人參二錢當歸三錢白朮二錢五分條芩八分生地二錢自蒸陳皮四分紫蘇四分甘草四分砂仁三分煩渴加麥冬一錢加棗二個三孕成後二三月內惡阻嘔逆或頭眩暈倦怠宜加味參橘飲人參一錢橘紅二錢白朮二錢半夏八分當歸二錢藿香四分甘草四分砂仁三分竹茹一丸如肥人加竹瀝一酒杯薑汁半匙姜三片加烏梅半個四孕婦常多怒氣胸腹滿悶或服烏藥香附砂仁等順氣耗藥反加滿悶宜服此方人參二錢白朮二錢當歸二錢川芎八分陳皮四分紫蘇四分甘草三分條芩八分木香三分五孕婦腹中不時作痛小腹下墮多血虛氣陷間有兼寒者服加味安胎飲白朮二錢人參二錢川芎八分當歸二錢甘草四分紫蘇四分陳皮四分懷熟地二錢如兼寒加吳茱萸一錢或乾薑砂仁各五分姜引六孕婦面目虛浮四肢有水氣多因脾胃氣虛或久瀉所致宜健脾利水服全生白朮散此症名曰子腫白朮二錢人參一錢川芎八分當歸二錢甘草三分紫蘇四分陳皮四分大腹皮七分茯苓皮一錢七胎氣上攻心腹脹滿作痛宜服順氣安胎散此症名曰子懸人參二錢白朮二錢紫蘇四分甘草四分陳皮四分砂仁四分當歸二錢川芎八分黃芩八分如有氣加木香二分磨姜引八受胎下血不止或按月來血點滴名曰胎漏大多因勞又因氣血虛有因喜食炙爆熱物過多宜謹房事服補中安胎飲白朮二錢當歸二錢人參一錢甘草三分熟地一錢黃芩四分紫蘇四分白芷四分又苧麻根治漏胎下血九孕婦頓僕動胎下血不止宜先服安胎飲一日二三帖如不止加阿膠艾安胎飲人參二錢條芩一錢川芎八分甘草四分紫蘇四分陳皮四分當歸二錢懷熟二錢陳膠一錢用蛤粉拌炒成珠研薑棗引仲景金匱膠艾湯治妊婦下血不止歸芎芍地甘草阿膠艾葉各等分用酒水煎服十孕婦心驚膽怯煩悶不安名曰子懸宜竹葉安胎飲當歸二錢白朮二錢人參一錢川芎七分甘草四分陳皮三分黃芩八分棗仁一錢遠志八分麥冬一錢竹葉十片懷生地一錢五分薑棗引若其人煩渴加竹茹一丸有痰加竹瀝七分酒盅薑汁三匙如虛人加人參二三錢如脾胃常瀉減生地棗仁十一孕婦腿膝發腫氣促滿懷不舒或足指縫出水蓋脾主四肢脾氣虛弱不能制水而發腫肺腎少母氣滋賴而氣促滿悶諸書名曰水氣治宜服天仙藤散不效服補中健脾湯此症名曰子氣天仙藤洗略炒香附炒八分陳皮四分紫蘇四分甘草三分烏藥七分木瓜一錢姜皮三片如虛人加人參一錢白朮二錢當歸二錢若脾氣虛弱人宜服補中益氣湯十二孕婦口噤項強手足攣縮言語謇澀痰涎壅盛不省人事可作中風治治以羚羊角散如無痰言語如常但見中風症多因血燥類風切不可概作中風類治誤人性命名曰子癇羚羊角一錢川芎七分獨活八分棗仁炒一錢五味子八分防風五分薏苡仁一錢當歸一錢茯苓八分杏仁十粒木香二分甘草四分如虛人加人參一錢痰多加竹瀝七分酒盅薑汁半匙脾胃虛加白朮一錢五分姜引十三孕婦小便澀或成淋瀝名曰子淋宜加味安榮飲人參二錢白朮二錢當歸二錢麥冬二錢茯苓皮一錢通草一錢甘草四分有痰宜清肺加黃芩七分若怒動肝火宜加柴胡燈心水煎十四孕婦形體勞苦或過食炒炙熱物小便帶血宜清膀胱之火服加味逍遙散當歸二錢芍藥一錢白朮一錢五分茯苓七分柴胡四分丹皮七分山梔七分炙甘草四分十五孕婦腹臍作脹或小便淋閉此由脾胃氣虛胎壓尿胞宜服安胎飲白朮一錢五分陳皮四分去皮甘草四分人參一錢川芎八分當歸二錢生地一錢五分柴胡四分半夏六分薑製升麻四分姜引空心屢服鹽湯探吐則氣升尿下經行亦一治法也十六孕婦元氣壯盛受胎後尚有血來幾次不妨乃血盛故也若不腰腿痠痛不須服藥若過慮可服安胎飲十七孕婦胸腹滿脹便閉遍身浮腫名曰胎水不利宜服鯉魚湯白朮五分當歸二錢芍藥二錢茯苓四分用鯉魚一尾重一二斤去鱗腸水煎加橘皮少許生薑七片用水四盞取汁盞半加四味藥煎七分如水未盡再製服十八孕婦咳嗽屬風屬寒宜定肺止嗽飲天冬二錢桔梗四分紫蘇四分知母一錢甘草四分寒嗽加杏仁十枚桑白皮八分有痰加桔紅四分竹瀝薑汁熱嗽加黃芩八分虛嗽加紫菀一錢冬花六分發喘夜多嗽加麻黃八分虛損咳嗽栝蔞一錢竹瀝薑汁心胸不舒貝母一錢百合一錢又方孕婦咳嗽不止胎不安杏仁十粒桔梗五分紫菀一錢甘草四分天冬二錢桑白皮八分竹茹一丸水煎入蜜溫服十九孕婦咳嗽吐血懷生地三錢知母一錢紫菀一錢白朮一錢陳皮四分甘草四分麥冬一錢黃芩八分天冬二錢犀角八分當歸二錢喘加栝蔞仁一錢二十孕婦霍亂吐瀉心煩腹痛先服六和湯半夏七分陳皮四分藿香四分甘草四分杏仁十粒竹茹一丸白扁豆二錢炒木瓜二錢人參一錢砂仁五分茯苓八分薑棗引水煎如服之不安次服安胎飲二十一孕婦瘧疾寒多熱少用安胎飲減陳皮加半夏七分草果三錢青皮三錢人參二錢白朮二錢當歸二錢烏梅二個紫蘇四分黃芩一錢甘草四分藿香五分姜引二十二孕婦口乾不得臥用安胎飲加麥冬乾葛或黃連為末粥飲調下一錢亦好二十三孕婦壅熱心神煩躁口乾渴宜參知散人參一錢知母一錢麥冬一錢梔子仁二錢炒甘草五分條芩五分蔞仁八分犀角八分夏加竹瀝薑汁棗引二十四孕婦熱病嘔吐不食胸中煩躁宜葛根湯蘆根一錢五分葛根一錢五分人參一錢麥冬一錢知母一錢竹茹一丸梔子一錢炒蔥白三寸水煎二十五孕婦熱病斑出赤黑色小便如血氣急欲絕胎落梔子一錢黃芩一錢升麻一錢青黛一錢豆豉四十九粒生地二錢杏仁十粒石膏一錢五分蔥白七寸二十六孕婦患骨疼痛不急治則胎落宜升膏散葛根石膏升麻柴胡青黛痰多加竹瀝一盞薑汁一匙二十七孕婦患吐衄血或因破傷失血驀患口噤項強背直類中風症皆因失血之故宜安胎飲加人參二三錢當歸二錢白朮二錢熟地二錢陳皮四分甘草四分條芩八分天麻一錢麥冬一錢防風一錢荊芥一錢以上二十七症孕婦病若與秘本對依此開方萬勿有失又活人書中治孕婦熱病發斑赤黑色者梔子大青湯升麻大青梔子杏仁黃芩蔥白引增補胎前十症傷寒子滿子鳴子喑中暑中濕泄瀉痢疾瘡毒無故哭泣妊婦傷寒宜清和為主各隨六經所見表裡之症治之切不可與常病傷寒同治以致損胎誤母子性命凡治傷寒不拘日數但見惡寒發熱為病在表用四味紫蘇和胎飲為主各隨所見之症加減治之紫蘇一錢五分白朮一錢五分條芩一錢五分甘草一錢如惡寒頭痛項強腰脊痛此病在太陽膀胱加羌活一錢防風一錢川芎一錢藁本一錢蔥連根鬚三根姜引蓋被取汗如惡寒不發熱只頭痛鼻乾或項強此病在陽明胃本方加葛根白芷防風等分蔥白三根淡豆豉一撮煎服汗解如寒熱往來頭眩或嘔或心下煩或胸脅滿此病在少陰膽加柴胡一錢人參一錢嘔加半夏八分胸脅滿加枳殼一錢桔梗一錢頭眩加川芎一錢姜引如發熱惡寒咳嗽甚者此病在手太陰脾加人參乾薑炙白芍酒炒各一錢薑棗引如惡寒蜷臥發熱手足冷此病在足少陰腎加獨活一錢熟地一錢細辛一錢薑棗引如惡寒手足厥冷唇口青遍身痛如被杖頭頂痛此病在足厥陰肝加炒當歸一錢炒吳茱萸一錢羌活一錢細辛一錢蔥連須三根薑棗引凡治傷寒不拘日數但無惡寒頭痛只發熱口燥咽乾而渴此病邪在裡用黃龍湯為主此湯出活人書並治頭痛脅痛嘔逆柴胡一錢黃芩一錢人參一錢甘草一錢如發熱口渴小便不利此病在手足太陽小腸膀胱腑病也加白朮一錢五分豬苓一錢澤瀉一錢赤苓一錢木通一錢如發熱大渴此病在手足陽明胃大腸也加知母一錢石膏二錢淡竹葉一把粳米一撮如大熱大渴煩躁大便不通此病在足陽明胃府也去人參加枳實一錢炒大黃一錢煨芒硝一錢姜引以利水為度如發熱口渴心煩不得眠或乾嘔此病在足少陽膽加麥冬花粉梔子棗仁各一錢竹肉一大丸如發熱而渴腹中痛自利此病在足太陰脾加白朮一錢白芍一錢阿膠一錢白茯苓一錢薑棗引如發熱而渴自利不止手足冷此病在少陰腎去柴胡加乾薑一錢炒赤石脂一錢白茯苓一錢砂仁一錢薑棗引如發熱而渴痢濃血手足冷此病在足厥陰肝加當歸一錢白芍一錢酒炒白朮一錢茯苓一錢烏梅引凡傷寒瘥後調理失宜復發熱者此勞復也用黃龍湯加知母一錢麥冬一錢石膏二錢淡竹葉粳米引取汁如因飲食失節復發熱者此食復也用前四味柴蘇和胎飲加炒枳實炒黃連陳皮神麯煨薑棗引若時行天氣傳染者依上法分六經表裡治之或於初病之時用敗毒散加和胎藥解之人參羌活柴胡茯苓前胡甘草川芎桔梗枳殼黃芩蘇葉葛根生薑蔥白引取汁凡傷寒熱不解遍身發斑赤如錦紋加味化斑湯治之人參一錢知母一錢石膏二錢甘草一錢黃芩一錢梔子仁一錢生地一錢淡竹葉二十片豆豉半合水煎服妊婦子滿孕婦至七八個月其胎長大腹大脹滿逼迫子戶坐臥不安名曰子滿束胎飲主之白朮一錢五分黃芩一錢五分蘇葉一錢五分枳殼一錢五分大腹皮一錢五分炙甘三分帶殼砂仁炒五分姜引妊婦子鳴孕婦欠身或向高處取物子在腹中失脫口中所含肐𦞂故啼曰子鳴治法令母作男子拜或豆散在地令母拾之子含著不啼妊婦子喑妊至八九個月忽然聲喑不語名曰子喑由少陰之脈下養乎胎不能上榮於舌之故俟十月生子後自能復聲非病也可服藥勿信庸醫妄利妊婦中暑其病發熱而渴自汗精神昏憒四肢倦怠少氣用清暑和胎飲炙黃耆一錢人參一錢炙甘草一錢白朮一錢黃芩一錢黃連一錢知母一錢麥冬一錢北五味十粒妊孕中濕或冒雨或早行感霧露之氣或久居濕地或大汗出取冷水洗浴其症發熱骨節痛身體重頭痛鼻塞用黃芩白朮湯條芩五錢白朮五錢蘇葉二錢五分姜五片妊婦泄瀉凡妊婦泄瀉以補中安胎為主用四君子湯加白朮一錢如發熱而瀉為熱加黃芩一錢不渴為寒加炮姜五分烏梅一個如久瀉大渴加葛根木香炒乾薑白芍酒炒訶子肉烏梅引等分視症酌妊婦痢疾凡妊婦痢疾以清熱和胎行氣養血為主黃芩芍藥湯主之切不可用大黃檳榔以致墮胎當歸一錢白朮一錢黃芩一錢白芍一錢黃連一錢枳殼一錢茯苓一錢陳皮一錢生甘草一錢木香五分烏梅引妊婦瘡毒病乳癰者托裡解毒湯主之川芎一錢當歸一錢白芷一錢黃芩一錢連翹一錢花粉一錢銀花一錢甘草節一錢青皮五分皂刺十個如背上臀上者病在陽明本方去青皮加升麻一錢葛根一錢如胸前兩頰生者病在少陽本方去白芷加柴胡一錢膽草一錢梔子一錢如背膊腋下生者病在太陰加陳皮去青皮又加桔梗一錢桑白皮一錢天冬一錢如在胯下陰旁生者病在厥陰本方去白芷倍加青皮如手足掌內生者病在少陰本方去白芷青皮花粉加黃連一錢黃柏一錢木通一錢凡癰毒有九處不可治一伏兔腳背二腓腨音肥善腳肚間三背脊中四肩俞夾背兩旁五項對口六胸七須八髭音咨九頤妊婦無故哭泣凡孕婦忽然無故悲慘哭泣狀如邪祟此臟躁症也十棗湯主之甘草三兩小麥一升大棗十枚水六升煎三升去渣分三服即效再服竹葉湯主之人參一錢麥冬一錢茯苓一錢炙甘草一錢小麥一合青竹肉一大丸薑棗引此十症秘本所無今從萬密齋先生女科中摘出以補未備俾學者覽之有蹊徑之可循不致茫無畔岸但古云醫不執方又在學者臨症憑脈神而明之不可膠柱鼓瑟也婦人妊娠宜常服當歸散金匱當歸川芎芍藥黃芩白朮胎動不安防其墮者宜服杜仲丸杜仲二兩水炒續斷二兩酒洗共末煮紅棗肉為丸每服三十丸米飲下空心食遠服並服胡連丸胡連丸安胎聖藥也條芩四兩沉水白朮二兩蓮肉去心二兩砂仁一兩微炒炙甘一兩共末另用山藥五兩米飲煮糊為丸米飲下胎前有血崩之症安胎飲加後止崩藥治之
