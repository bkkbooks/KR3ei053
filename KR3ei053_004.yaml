body:
  text: 卷二辨病胎小産弱症醫方墮胎辨俗名小産丹溪論血不足以榮養其胎而墮胎者猶枝枯而果落藤萎而花墮也其勞怒動火而墮者猶風撼其木人折其枝也二論極是然未詳晰論辨無惑乎妊婦之不慎戒也夫婦人衝脈主血海血旺始成胎任脈主胞胎靜養則胎安若怒傷肝勞傷腎致二臟失相火耗血動氣未有能保孕之不漏不墮娩後尚多崩熱之症也如衰弱人有妊及曾墮者必須恪遵胎教通達事情如古太任兢兢愛護坐臥不偏視聽無邪毋溺專寵閫事悉委於婢妾罔懷妒忌忿懥不留於胸臆至如食物藥餌一律禁戒無犯斯火不動而血旺蔭孕形不勞而氣完胎固且生子稟全易養形端體正況屢墮損血倍於正産怒勞致墮由已自招稟弱之人惟知有子自足毋以小嫌害大而自取無後之憂也補母固胎飲忌食小鯉魚莧菜白朮二錢當歸二錢熟地二錢陳皮三分紫蘇三分砂仁三分甘草三分人參一錢條芩八分智草五分大棗二枚妊婦誤食莧菜諸藥書此以曉弱婦欲子壽必須信方月服凡妊至四五六月內誤食莧菜或少服苓術等藥多吃炙爆煎炒動火熱物必墮胎産如見有別症凡大黃芒硝一切金石下氣之藥皆宜禁用萬不得已亦宜斟酌不用中病即止勿誤人命不特半夏牛膝等藥宜慎即茯苓性降亦須慎用時醫不知故特表而出之總之孕婦雜症必以安胎為主雜症為佐使矣妊婦失血類風症辨凡孕至四五月患吐血衄血及損傷血驀然口噤項強手足難動履背如角弓症類中風切不可認為真中風而降火化痰方治宜服安胎飲以補血為主以風痰之藥佐之無失補血安胎理風湯川芎二錢天麻二錢黃芩二錢羌活五分防風五分荊芥五分白芍三分當歸三分人參三分紫蘇四分甘草四分附應驗方案有樂埠沈禹門室妊六月因禹病拜斗齋勞割股失血驀然口噤項強及角弓豫用安胎飲加化痰治稍安又遇範東蘺極詆豫補中風痰誤彼以豁痰降火方病人服如刺心棄渣豫復用前方倍參二十帖母安産兒一上虞趙方橋室妊至五月患衄血去兩升頭暈口噤手掉以安胎飲倍參當加川芎天麻犀角生地而愈書此以見妊婦雜症必須安胎補血為主也胎不安毋議落胎救母辨妊婦患虛損潮熱骨蒸少力或崩漏或少食皆致孕婦氣血不足胎若月久不能鼓動或胎不安上攻或跌撲損胎不動疑胎死活難辨或患熱病損胎或因誤食動胎藥及食莧菜雖血行胎逼切不可用落胎之方妄議去胎救母也必須補母之氣血力健則胎自然漸動即其胎死助血自落可保兩全而無虞也若攻弱母之胎胎落而母繼殞者多矣慎之妊婦患傷寒或患疫病熱久皆墮胎墮後未免增熱因熱消陰血又繼産血脫故也治者慎勿妄論傷寒疫症未除誤投梔子豉湯芩柏等藥或往來寒熱柴胡不可用也或潮熱大小便祕承氣五苓等方不可投也宜頻服生化湯時進兩帖不拘帖數服至熱退停藥如虛脫形色脫汗多或渴二帖後即加生脈散人參麥冬以防暈厥危症且生化湯有川芎性辛散邪乾薑助血藥能除陰火大熱其結便祕灼熱多服生化湯自然津液之纍生二便通利矣若熱用寒劑反愈虛中氣且血得寒則滯變症百出誤之甚也胎前藥物宜忌牛膝赤茯苓大黃芒硝半夏附子肉桂南星巴豆大戟芫花米仁藜蘆厚朴槐花桃仁丹皮茅根瞿麥三稜通草紅花蘇木麥芽神麯常山葵子乾薑麝香蟹牛黃雄黃烏豆天雄蟬蛻檳榔胡索蒺藜牽牛皂莢乾漆虻蟲水蛭蟅蟲蛇蛻蜈蚣水銀安息香破故紙王不留行淡竹葉根
