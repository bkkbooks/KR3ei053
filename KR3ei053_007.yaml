body:
  text: 卷五産後禁忌藥物産婦禁用諸藥産後忌食諸物鄉俗産後十弊産後用藥十誤産婦禁用諸藥一産婦氣不順禁用枳殼厚朴等耗藥二産後傷飲食禁用枳實大黃蓬稜三産後身熱禁用芩連梔柏四産後七日內禁用地黃芍藥五産後血塊痛禁用牛膝蓬稜蘇木六産後大便不通禁用大黃芒硝七不可服濟坤丹要損血氣八不可服瘦胎丸要傷胎九不可用産寶峻藥方産後忌食諸物一果忌梨藕橘柑柿西瓜要停血作痛二食忌冷粉緑豆冷飯蕎麥要停血作痛三忌鵝犬豬牛首肉恐犯諸藥又恐停血塊作痛四忌莧菜生菜苔菜停血痛五忌沙糖酒要損新血六忌獨煎山楂湯損新血七忌多食胡椒艾酒行血致崩八忌生薑酒寧波俗弊發汗行血九忌濃茶汁寒停血塊痛鄉俗産後十弊一産畢毋令食牛羊豬鵝肉雞子面物虛人難消化二毋食涼粉緑豆粥澉汁蕎麥麵三毋多食胡椒艾酒血塊雖得熱流通新血亦不寧防崩漏四産後寧波俗弊多用薑數斤以消血塊發熱亡血致危五産後毋食梨橘柑藕冷菜及冷藥冷水致血塊凝結六毋食橙丁橘干枳朮香砂等丸重損新血七七日內毋勞洗以勞神毋勉強早起以冒風寒八産後月之內毋多言勞女工九産後暑月毋用冷水洗手足十産後遇大寒月用小衣烘熱常溫腹內冷則塊痛久雖藥不行産後用藥十誤一産後誤用耗氣順氣等藥胸膈飽悶雖陳皮不可用至五分二誤用消食藥多損胃減飯甚至不進食且凝血塊三身熱誤用芩連梔柏損胃增熱甚至不進食且凝血塊四三日內未服生化湯以消血塊毋輕用人參耆朮熟地致塊不消至危亡五毋用地黃以滯惡露毋獨用枳實枳殼牛膝以消塊六毋用大黃芒硝以通大便致泄瀉成臌脹七毋用蘇木三稜蓬朮牛膝以行血塊致損新血八俗多用山楂一味煎汁以攻血塊成危疾而死人不可不知也九毋服濟地丹兩三丸下胞下胎十毋信産寶百問及婦人良方
