body:
  text: 跋胎產指南一書其效如神余聞之久矣而醫家往往秘而不宣無從購求寧海任松云先生善岐黃術又心存濟人與余嘗談因果事甚相得昨偶言及病之險而難治者莫如胎產為甚伊即出此書以示見之如獲至寶亟付梓以公同好云光緒丁丑秋仲廬江丁維庚識
