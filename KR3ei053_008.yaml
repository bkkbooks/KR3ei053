body:
  text: 卷六産後二十九症醫方一産後血塊痛宜服生化湯照前開法分兩頻服幾帖即時塊散痛止血旺精神雖少壯産婦無病多服幾帖補血有益其産母腹上用烘衣服暖和血塊易散雖暑月亦用益母丸一顆鹿角灰一錢失笑散三方可用一方以行塊不可用蘇木蓬稜峻藥雖山楂弱人服之亦有大害二産後去血多或勞倦昏暗血暈宜服生化湯數帖服至産婦有精神止藥如血暈形色脫或汗多加人參三四錢在生化湯內慎不可論惡血搶心妄投破血藥害人三胞衣不下宜服生化湯溫服幾帖初煎就送益母丸一粒次煎又送外用烘熱衣服暖産婦腹慎不可冬月坐夜桶及人身上守候下胞嚴寒多損産婦必用扶上床被蓋火籠溫和兼服生化湯助血得無失四産後頭痛身熱惡寒雖明知感冒風寒只宜服生化湯連進二三帖服至熱退痛除止藥且不可預加別藥其川芎乾薑性亦散邪慎不可用麻黃柴胡等方以表汗虛産如服三四帖後頭痛如故加連須蔥頭四五個或用蔥放鯗魚湯內送飯五産後乍寒乍熱脅痛或頸痛宜服生化湯二三帖如未除再加桂枝七八分以散寒磨木香一分切不可認為脅痛傷寒用柴胡湯表汗虛産六産婦感寒上攻則心痛下攻則腹痛且血塊又痛宜服生化湯加桂枝五分以散寒定痛如兩帖未止再加吳茱萸或乾薑三片加在生化湯內以助血若獨用諸熱藥以攻寒其痛雖止其血未免來多防有崩暈之患慎不可用吐汗諸熱性藥以虛産七産後身熱或夜間熱或寒熱往來並不須加減只宜服生化湯以除熱定痛此重言産後不可汗總結上三症八産後寒熱往來每日應期發作類瘧宜服生化湯幾帖則寒熱自除如汗多人虛服卷中補方慎不可用常山草果等方以止瘧虛産九産後感寒心下痞滿宜服生化湯加陳皮五分桔梗五分白豆蔻五分磨木香一分慎不可專用陳皮桔梗豆蔻以虛産十産後感風寒咳嗽或身熱宜服生化湯加杏仁十粒知母一錢天冬一錢甘草四分桔梗五分有痰加橘紅四分花粉八分如有汗服卷中補方不可用散風寒藥方十一産後傷食宜服生化湯加炒神麯一錢麥芽五分以消面飯加山楂四粒砂仁五分以消肉食如傷寒飯食加吳茱萸一錢桂枝五分傷寒食脅痛加肉桂七分切不可專用消食藥以損氣血虛産十二産後忿怒心胸滿悶宜服生化湯加磨木香二分入藥內服不可用烏藥香附砂仁枳殼枳實厚朴等以損元氣十三産後大便日久不通宜服生化湯加肉蓯蓉二錢日服兩三帖助血旺自通另研芝麻三合和米一升作粥三四次食之慎不可用大黃等方結燥日久多用大黃成臌脹戒之十四産後去血多或汗多小便澀少或不通宜服生化湯加生脈散人參麥冬以通之切不可用五苓散以行小便如服藥不通外用蔥尉法用蔥頭十個綿縛切如指厚放臍上以艾火尉之十五産後泄瀉先服生化湯加茯苓一錢澤瀉七分石蓮子六個另用糯米一合煮粥食之如泄瀉形脫昏倦加參生化湯治之十六産婦原本佚十七産婦心神失守妄言妄見似邪失血之故宜生化湯加茯神一錢棗仁一錢柏子仁一錢遠志一錢慎不可為痰火降散虛産符尺驚産如虛汗脫服卷中補方十八産婦足冷發厥血塊又痛宜服生化湯加乾薑二三帖後用卷中補方慎不可輕用四逆等湯十九産婦痢不分紅白産痢不分紅白宜服生化湯減乾薑加木香三分連服兩三帖則血塊與痢積推蕩盡矣又不損産婦血氣切不可用芩連寒藥以停血塊二十産後血脫大崩宜頻服生化湯加荊芥一錢如形色脫服卷中補方二十一産後霍亂吐痢多自虛中感寒宜服生化湯加砂仁生薑茯苓藿香或六和湯二十二産後遍身痛多自血虛氣滯服生化湯加韭白二十根肉桂八分二十三産後起居太早産戶感風寒作痛衣被等亦難近身體宜服生化湯加桂枝獨活防風以散風寒産戶感風如生癰毒時醫皆言生癰毒惟一僧言産七日內起居風入産戶風性熱即痛甚祛風可愈豫羡其明見不隱其方勿誤生癰疽而服敗毒散服當用祛風定痛散當歸三錢獨活防風肉桂各五分川芎一錢茯苓一錢荊芥五分生地二錢棗五個二十四産後發癰疽宜生化湯加連翹花粉各一錢甘草節八分如心下噁心煩悶用滴乳香一錢緑豆粉五錢和服切不可用敗毒散大黃等方二十五産婦四肢麻木血虛甚宜服生化湯加浮萍如血脫崩麻木宜服卷中補方二十六産後目痛昏熱赤腫宜生化湯加荊芥切不可用洗心散芩連梔柏等方二十七産後因怒或偶吐血宜生化湯減川芎用當歸二錢去尾荊芥八分犀角末八分慎不可用生地黃柏等涼藥方二十八産後卒然口噤牙顫手足抽搐類中風宜生化湯加天麻羌活防風姜引二十九産後煩躁口渴宜服生化湯及生脈散
