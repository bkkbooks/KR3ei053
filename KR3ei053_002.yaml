body:
  text: 卷首女科總論男女均稟天地之氣而生凡外感內傷之症未嘗不同但女則別有調經胎前産後之治所以別立一科也男子之血宜靜而不宜動如或動焉則吐血衄血瀉血之病生矣女子之血宜動而不宜靜如或靜焉則經閉血枯之病生矣總而言之調經專理氣補心脾為主蓋血非氣不行心生血脾統血也胎前專以清熱補脾為主蓋熱清而胎安脾健則不墮也産後專以大補氣血兼行滯為主蓋産後氣血大虛且有瘀滯雖有諸症皆以末治生化湯實為聖方也知乎此女科之大要得矣胎産脈候女人於少陰心脈動甚其胎已結若按之滑疾不散胎必三月但疾不散五月可別左疾為男右疾為女故脈訣云尺數關滑而寸盛陽搏陰別而雀躍是也若胎離經或一息二至三至為將産之候胎前脈宜洪數有力若沉微者必難産謂氣血已敗也産後脈宜緩小無力忌實大弦牢者謂脈與病反邪氣盛也調經章經云女子二七而天癸至衝任滿盛月事以時下乃有子故得其常候者為無病苟不及期而經先行或過期而後行或一月而經再行或數月而經一行或閉而不行或崩或漏皆失其常候不可不調也調治之法熱則清之冷則溫之虛則補之滯則行之滑則固之下陷則舉之對症施治以平為期如芩連梔柏清經藥也丁桂薑附溫經藥也參朮歸茯補虛藥也川芎歸附青皮元胡行滯藥也牡蠣赤石脂棕櫚灰側柏葉固澀藥也升麻柴胡荊芥白芷升舉藥也隨症用之無不效者矣婦人經候不調有三一曰脾虛二曰衝任損傷三曰脂痰凝塞治之不可不審脾胃虛弱者經曰二陽之病發心脾女子不月夫二陽者陽明胃也胃主受納五穀長養血氣灌溉臟腑流行經絡乃水穀之海血氣之母也惟憂思慮則傷心心氣受傷脾氣失養鬱結不通腐化不行所謂長養灌溉者失其全矣故脾胃虛弱飲食減少氣日漸耗血日漸少始有血枯血閉及血少色淡過期始行數月一行之病衝任損傷者經曰氣以詬之血以濡之故氣行則血行氣止則血止也女子之性執拗偏急忿怒妒忌以傷肝氣肝為血海衝任之系衝任失守血氣妄行也又褚氏曰女子血未行而強合以動其血他日有難名之病故女未及二七天癸之期而男子強與之合或於月事未斷之時男子縱欲不已衝任內傷血海不固由斯二者為崩為漏有一月再行不及期而行者矣脂痰凝塞者蓋婦人之身內而腸胃開通無所阻塞外而經絡流行無所凝滯則氣血和暢經水應期惟彼肥碩者脂膏充滿玄室之戶不開挾痰者痰涎凝滯血海之波不流故有過期而經始行或數月而經一行及為滯為帶為經閉為無子之病不及期而經先行如往性溫和素無他疾者責其血虛且有熱也俱用水煎空心服當歸一錢川芎八分赤芍一錢生地一錢知母一錢地骨皮一錢麥冬一錢甘草五分如性急躁多怒多妒者責其血氣俱熱且有郁也歸身一錢川芎一錢白芍一錢生地七分條芩炒黃連炒香附便浸炒各一錢甘草五分如形疲素無他疾者責其血熱也用四物芩連湯主之當歸一錢炒川芎一錢炒生地一錢炒白芍一錢炒黃芩一錢炒黃連黃柏黃芩各炒等分用蜜丸白湯下如形疲素多痰且有熱者責其衝任內傷也用當歸一錢白芍一錢熟地一錢人參一錢知母一錢麥冬一錢川芎一錢甘草五分加薑棗水煎更服地黃丸地黃丸治女子衝任損傷及胃虛血虛血枯血閉之症熟地八兩山藥四兩萸肉四兩白茯苓三兩丹皮三兩蜜丸空心白湯下如曾誤服辛熱暖宮之藥者責其衝任有伏火也用歸身一錢赤芍一錢生地一錢知母一錢川芎七分黃柏一錢炒木通去皮一錢甘草五分更服三黃丸和之如形肥多痰多郁者責其血虛氣熱也用當歸川芎生地薑汁炒各一錢陳皮五分半夏五分白茯苓五分生甘草五分條芩一錢香附一錢便浸炒黃連一錢炒加薑水煎服經過期而後行如往性溫和素無痰者責其血虛少八物湯主之加薑棗當歸川芎生地酒炒白芍人參白朮茯苓甘草各等分如性急躁多怒多妒者責其氣逆血少氣前方加香附便浸炒青皮等分水煎兼服蒼莎丸以調之蒼莎丸和中開鬱蒼朮香附各三兩便浸一日夜條芩一兩五錢共為末湯浸蒸餅丸如形疲素無他疾者責其氣血俱不足也十全大補湯主之十全大補湯專治氣血兩虛脾胃不足人參一錢黃耆一錢白朮一錢茯苓一錢炙草一錢當歸一錢川芎一錢白芍一錢生地一錢肉桂五分加薑棗如形疲食少責其脾胃虛弱氣血衰少也用異功散加當歸川芎湯主之人參茯苓白朮陳皮甘草各等分此五味名異功散加歸芎薑棗兼服地黃丸如形肥及飲食過多之人責其濕痰壅滯軀肢迫塞也六君子加芎歸湯主之參術陳皮苓甘半夏加川芎當歸香附各一兩便浸兼服蒼莎丸如素多痰者責其脾胃虛弱氣血失養也用參朮大補即參耆白朮散加芎歸人參五錢白朮七錢茯苓七錢甘草三錢陳皮五錢蓮肉七錢山藥一兩砂仁五錢石菖蒲五錢加歸身七錢川芎五錢共為末用荷葉包米煮飯為丸米飲下兼服地黃丸一月而經再行如性急多怒者責其傷肝以動衝任之脈四物加柴胡湯主之兼常服補陰丸以瀉衝任之火當歸川芎白芍生地加柴胡人參條芩生甘黃連各等分水煎補陰丸黃柏炒知母去皮等分蜜丸每服五十丸如曾服辛熱之藥者用四物湯加黃柏知母服三補丸主之如曾傷衝任之脈者用四物湯加人參知母麥冬服及地黃丸主之數月而經一行如疲人責其脾胃弱氣血虛用十全大補湯及地黃丸主之如肥人責其多痰及氣血虛用六君子加蒼莎導痰丸主之人參川芎白朮半夏各七分白茯一錢陳皮一錢蒼朮一錢當歸一錢香附一錢枳殼一錢蒼莎導痰丸蒼朮二兩香附二兩陳皮一兩白茯一兩枳殼一兩半夏一兩南星一兩甘草一兩用生薑自然汁浸餅為丸淡薑湯下經行或先或後悉從虛治加減八物湯主之人參白朮茯苓當歸川芎甘草陳皮白芍丹皮丹參香附加薑棗烏雞丸專治婦人脾胃虛弱衝任損傷血氣不足經候不調以致無子者神驗用烏骨雞一隻先以粳米餵養七日勿令食蟲蟻吊死去毛雜以一個為率用生地二兩熟地二兩天冬二兩麥冬二兩放雞肚中陳酒十碗砂罐煮爛取出再用桑柴火上焙去藥更將余酒淹盡焙至焦枯研末再加杜仲二兩用鹽水炒人參炙甘草蓯蓉故紙炒小茴各一兩炒歸身川芎白朮丹參白茯苓各二兩香附四兩醋炒砂仁一兩共研末和上藥末酒調麵糊為丸每服五十丸空心米飲下經將行腹痛凡經水將行腰脹腹痛者此氣滯血實也桃仁四物湯主之歸尾川芎赤芍丹皮香附醋炒胡索各一錢生地五分紅花五分桃仁二十五粒研泥水煎入桃仁服如疲人責其有火加黃連一錢黃芩一錢如肥人責其有痰加枳殼一錢蒼朮一錢凡經水過多腹中痛者此虛中有滯也加減八物湯主之人參一錢白朮一錢白茯一錢歸身一錢白芍一錢生地一錢炙甘五分木香五分青皮七分香附一錢醋炒加薑棗經水多少如肥人行經來少者責其痰礙經隧也二陳湯加芎歸主之陳皮一錢白茯一錢當歸一錢川芎一錢香附一錢便浸枳殼一錢半夏八分甘草五分滑石二錢如疲人經水來少者責其血虛也四物湯加人參湯主之當歸一錢川芎一錢白芍一錢生地一錢人參一錢香附一錢炙甘八分加薑棗凡經水來太多者不問肥疲皆屬熱也四物加芩連湯主之當歸一錢白芍一錢知母一錢生地一錢條芩一錢黃連一錢川芎五分黃柏七分並服三補丸經水紫淡色如紫色者熱也四物加香附黃連主之歸尾川芎赤芍生地香附便浸黃連生甘丹皮各一錢如白淡者虛也八物湯主之人參一錢白朮一錢茯苓一錢當歸一錢川芎一錢白芍一錢熟地一錢黃耆一錢香附一錢便浸炒炙甘草五分加薑棗更常服地黃丸以上調經藥並宜於行經時連進十餘服則經自調矣丸藥宜久服經閉不行婦人經閉不行其候有三脾胃損傷飲食減少氣耗血枯而不行者當補其脾胃養其氣血待氣血充生經自行矣不可妄用通經之劑致中氣益損陰血益干便成癆瘵而不可救故有猶索千金於乞丐日加捶楚徒斃其生者矣一則憂愁思患惱怒怨恨氣鬱血滯而經不行者當開鬱氣通滯血而經自行苟用補劑則氣得補而益結血益凝聚致成癥瘕脹滿所謂養虎自遺患也一則軀脂迫塞痰涎壅塞而經不行者當行氣導痰使經得行斯謂之良工矣如因脾胃損傷血枯不行者加減補中益氣湯主之烏雞丸亦可服人參二分白朮二分黃耆七分柴胡七分炙甘五分當歸一錢白芍一錢川芎一錢陳皮一錢神麯五分麥芽五分加薑更服煮參苓朮丸以經行為度如因氣鬱血閉不行者用開鬱二陳湯主之陳皮一錢茯苓一錢蒼朮一錢香附一錢川芎一錢半夏七分青皮七分莪朮七分檳榔七分甘草五分木香五分加薑更宜服四制香附丸以經行為度此丸乃婦人之常藥四制香附丸香附一斤分四制酒醋童便鹽水各浸三日焙乾天台烏藥八兩共末醋糊為丸白湯下如因痰者用蒼莎導痰丸主之更服開鬱二陳湯去莪朮加枳殼一錢有愆期未嫁之女偏房失寵之妾及寡婦尼姑欲動而不能得遂憾憤而不能得伸多有經閉之疾含羞強忍不欲人知致成癆瘵之病而不可救宜用四制香附丸參朮大補丸攻補兼行庶或有瘳此七情之發無法治之也有經閉不行骨蒸潮熱脈虛者增損八物柴胡湯主之人參一錢白茯苓一錢當歸一錢白芍一錢生地一錢麥冬一錢知母一錢柴胡一錢甘草五分倘有汗加地骨皮一錢無汗加丹皮一錢加竹葉凡婦人虛有熱者皆可服之如熱太甚服此不平加炮薑一錢神效如經閉發熱咽燥唇乾脈實者四物涼膈散主之當歸一錢川芎一錢白芍一錢生地一錢黃芩一錢酒炒黃連一錢酒炒梔子一錢炒連翹一錢桔梗一錢生甘五分薄荷五分加竹葉凡血實形盛脈有力者皆可服石瘕因行經時寒氣自陰戶入客於胞門以致精血凝聚月信不行其腹漸大如孕子狀婦人壯盛者半年之後小水長而消矣若虛怯者必成腫病溫經湯主之歸身梢一錢川芎一錢赤芍一錢莪朮一錢人參一錢牛膝一錢故紙一錢小茴一錢炙甘五分加薑棗更宜頻服香附丸腸覃因行經之時寒氣自肛門入客於大腸以致經血凝澀月信雖行而少其腹漸大如孕為胎漏狀壯盛婦人半年以後便長水消氣盛而除虛怯者必成脹病桂枝桃仁湯主之桂枝一錢五分檳榔一錢五分白芍一錢生地一錢枳殼一錢桃仁二十五粒去皮尖研炙甘五分加薑棗更宜服四制香附丸崩漏章崩婦人崩中之病皆因中氣虛不能攝血加以積熱在裡迫血妄行故令經血暴下而成崩中崩久不止遂成下漏叔和脈訣云崩中日久為白帶漏下時多腎水枯也治有三法初止血次清熱後補其虛未有不痊者也凡血崩用五靈脂半生半炒酒服能行血止血治血刺痛神效五靈脂不特治血而兼治風誠治崩之妙藥也初止血者乃急則治其標也四物湯調十灰散止之血止為度藕節蓮蓬艾葉棕櫚大小薊根側柏乾薑油頭髮山梔子以上十味俱煅存性研等分和勻每服三錢或用醋煮糯米粉為丸每服百丸婦人衝任經虛風傷營血以致崩中風為動物血崩乃風動之故必用風藥也次清熱血既止宜服清熱之劑用涼血地黃丸主之生地一錢當歸一錢醋炒黃連五分黃柏五分知母五分藁本五分川芎五分升麻五分柴胡七分羌活七分防風七分黃芩四分生甘四分細辛四分荊芥穗四分蔓荊子四分紅花一分水煎如血未止再吞十灰丸血已止熱已除宜用補中之劑加味補中益氣湯主之人參一錢黃耆一錢白朮一錢陳皮一錢當歸一錢白芍一錢熟地一錢炙甘五分白茯五分升麻五分柴胡五分益智五分黃柏五分炒加薑棗更宜早服地黃丸晚服參朮大補丸以平為期漏凡崩久成漏連年不休此中氣下陷下元不固也宜用前加味補中益氣湯兼服鹿角霜丸主之鹿角霜一兩柏子仁一兩炒歸身一兩茯神一兩龍骨一兩煅阿膠蛤粉炒成珠一兩川芎七分香附二兩醋炒炙甘五分續斷一兩五錢共末山藥五兩研米飲煮糊為丸每服五十丸空心溫酒下經血妄行如經妄行或吐血鼻中血出或口內血腥用前四物涼膈散加生韭自然汁服之赤白帶下帶下之病婦人皆有之赤者屬熱兼虛兼火治之白者屬濕兼虛兼痰治之年久不止者以補脾胃為主兼升提大抵疲人多痰要知此候白帶灸中極穴七壯在臍下四寸極效古今醫鑑赤帶用四物湯加芩連再加升麻丹皮主之兼服三補丸白帶用加味六君子湯主之半夏一錢陳皮一錢蒼朮一錢人參一錢白朮一錢白茯一錢炙甘草七分升麻五分柴胡五分加薑兼服蒼莎導痰丸帶久不止者專以補虛為主宜十全大補湯去地黃加陳皮半夏乾薑炒更服參朮大補丸以補脾胃之虛又服補宮丸以固下元脫補宮丸鹿角霜白朮白茯苓白芍白芷牡蠣煅童便淬山藥龍骨煅赤石脂等分乾薑減半炒醋糊為丸空心米飲下白濁白淫白帶辨症婦人常有白濁白帶之疾症既不同治亦各別白帶者時常流出清冷稠黏此下元虛之症也用白帶久不止之法治之白濁者隨小解而來渾濁如泔此胃中濁氣滲入膀胱也加味二陳湯主之陳皮一錢半夏一錢茯苓一錢白朮一錢蒼朮一錢益智仁一錢鹽炒炙甘五分升麻七分柴胡七分加薑遺白帶方酒煮白果三升去心膜曬乾為末每服三錢白湯下白淫者常在小便之後而來亦不多此男精不攝滑而自出不治自愈溫經湯方婦人行經時連服三帖亦能成孕半夏一錢陳皮一錢生地一錢全歸三錢川芎八分紅花八分白芍八分秦艽八分烏藥八分香附一錢五分木通三分青皮七分加薑通經方牛膝花粉木通三稜莪朮鬱金威靈仙連翹生地葶藶香附芍藥蒺藜三蠶砂炒茜草根去閼方川芎續斷桃仁紅花丹皮鱉甲生蒲黃胡索瞿麥蘇木穿山甲月經不止方川芎歸身木賊地榆樗白皮倒挂塵炒蓮房荊芥穗側柏葉貫仲烏梅竹肉藕節棕灰大小薊根發灰梔子種子章無男女則乾坤幾乎息矣男子匹配所以廣嗣厥系非輕勿謂無賴於人事也生育者必陽道強健而不衰陰癸應候而不愆陰陽交暢精血合凝而胎元易成矣不然陽衰不能下應乎陰陰虧不能上從乎陽陰陽乖戾是以無子雖雲天命之有定抑亦人事之未盡與故種子者男則清心寡欲以養其精女則平心定氣以養其血補之以藥餌濟以方術是謂人事之當盡也何謂男貴清心寡欲蓋形樂者易盈志樂者易蕩富貴之人不知御神則蕩心傾不知御形則盈必虧此清心寡欲為男子第一要緊也何謂女貴平心定氣蓋女子以身事人而性多躁以色悅人而情多急稍不如意即憂思怨怒矣憂則氣結思則氣鬱怒則氣逆怨則氣阻血隨氣行氣逆血亦逆此平心定氣為女子第一要緊也藥餌維何男子宜服地黃丸以補左腎之陰加杜仲蓯蓉巴戟補骨沉香以補右腎之陽女子宜服烏雞丸以養其血氣調其經候斯為得理若彼桂附丹石動氣耗陽損血消陰之劑一切止之何謂濟之以方術如種子之歌素女之論是也女人無子多因經候不調藥餌之輔尤不可緩若不調其經候而與之合徒用力於無用之地此調經為女人種子緊要也如肥盛婦人稟受甚厚及恣於酒食之人經候不調不能成胎謂之軀脂滿澀閉壅子宮宜行濕燥痰用蒼莎導痰丸四制香附丸如瘦怯性急之人經水不調不能成胎謂之子宮乾澀無血不能攝受精氣宜涼血降火用地黃三補丸調之如素有濁漏帶下之人經水不調不能成胎謂之下元虛憊不能聚血受精宜補虛澀脫用烏雞丸補宮丸調之種子歌云三十時辰兩日半二十八九君須算落紅滿地是佳期經水過時空霍亂霍亂之時枉費工樹頭木底覓殘紅管取放花能結子何愁丹桂不成叢此蓋言經水未行之時血海正滿子宮未開不能受精以成胎經水既行則子宮開血海淨斯能受精矣然自行經之時算至三十個時辰恰兩日半種子當貴其時故一日二日三日與之交則多生男四日五日六日與之交則多生女七日之後子宮復閉不受胎矣婦人陰盾取象於月若是朔至望經行不失其候者結胎易生子多壽以月光漸生月輪漸滿也若自望至晦經行或失其期者胎雖結生子多夭以月光漸消月廓漸空也此造化之理可與得情者道之矣素女論中男有三至女有五至如男至而女未至玉體才交瓊漿先吐雖欲下應乎陰而陰不從也如女至而男未至桃浪先翻玉露無滴雖欲上從乎陽而陽不應也所以無子然氣至者亦有先後男女之別如陽精先至陰血後參則精開裹血而成女陰血先至陽精後沖則血開裹精而成男故卜書云陰包陽則桂庭添秀陽包陰則桃洞得仙此之謂也何謂男有三至蓋陰痿而不舉肝氣未至也舉而不堅腎氣未至也堅而不熱心氣未至也肝氣未至而強合則傷肝其精滿滴而不射腎氣未至而強合則傷腎其精散漫而不黏聚心氣未至而強合則傷心其精冷而不熱此男子之所以無子貴乎清心寡欲以養肝腎心之氣也何謂女有五至蓋交戲之時面赤而熱心氣至也目中涎瀝漸睨視人肝氣至也嬌聲低語口鼻氣喘肺氣至也伸舌吮唇以身偎人脾氣至也玉戶開張瓊涎流出腎氣至也五氣皆至而與之合則情合意美陽施陰受有子之道也男女無疾交會應期三虛四忌不可不避三虛者天地晦冥日月薄蝕電雷風雨晦滋朔望天之虛也地震土陷山崩水溢地之虛也憂怒悲恐醉飽勞倦人之虛也犯此三虛交而不孕孕而不育疾病且生身之災也四忌者一忌本命正沖甲子庚申滅沒休廢之日二忌大寒大暑大飽大醉之時三忌日月星辰寺觀壇場之前冢墓之處四忌觸忤惱犯罵詈擊搏之事犯此四者令人無子且至夭也凡種子者當應候之時男服補腎益精之藥女則調其飲食淡其滋味避其寒暑至夜半生氣乘旺之時依上三至五至三虛四忌行之自然交而必孕孕而必成矣養生書云行房事切忌子時前乃陽衰陰盛之候保胎輯要總論凡有婦人即有生育此造化自然之理古今之常事而臨産者每抱憂疑皆由未明此理之故蓋造化原不令人難生人多不曉調攝因而難生造化原不令人逆生人多慌忙逼迫因而逆生難逆兩端關係二命倘平時不知講求則臨産必致誤事至穩婆不可不用亦不可專意聽信倚靠緣彼無書傳無師授此理全然不知多執己見胡做亂為誤人性命凡為夫君者宜平時家中講談令婦人習聞有孕知調攝臨産有主張不懼怕不早用力自無難産逆生之害以受胎後論即不能知古人胎教凡宜禁忌者亦當省悟以臨産時論胎至十月形完氣壯手足必動子動則母必腹痛痛急則胞衣必破子自出胞衣而來苟不甚耐順時見其腹痛半日一日不産即為難生不知自胞衣未破子未出胞衣倘用藥用符催其速生一催之間多致誤事豈知天地生物胎卵蠢動皆自生養何嘗用藥用符故臨産切不可慌張即三五日不産亦不妨須要忍痛安心任其自然分娩受胎保護受胎後即宜用布一幅闊六七寸長短視人肥瘦約縛二道橫束腰間直至臨盆方解去若是試痛仍不宜解此有二妙胎未長成得此則腰膂有力些須閃挫不致動胎又能常令腹中窄狹及到解開則腹中乍寬轉身容易胎後睡時須要兩邊換睡不可盡在一邊要使小兒左右利便手足慣熟則産時中道而出不難矣孕後飲食宜淡泊不宜肥濃不宜重濁宜甘平不宜辛熱青蔬白飯亦能養人若在貧家頗而不乏但富貴之家平日甘肥饜足抑令崇儉勢所不堪酌乎其中臚列如下宜食諸物肚肺雞鴨鯗海參腐皮麻油白菜菠菱筍蓮子熟藕山藥芡實諸物總要潔治多用清湯吹去浮油飲之最佳俱用白煎忌用油煎此多為膏粱之人言耳若藜藿之腹正宜得肥甘而潤之何淡泊之有但六七個月後腐皮麻油二味最佳不妨日日食之麻油解毒腐皮滑胎且清且補貧富皆宜允為上品積食一二百張則首生如達矣或以麻油拌食更妙不宜熬熟忌食諸物椒薑煎炒野味豬肝血犬肉蟹黑魚難産七因一因安逸蓋婦人懷胎血以養之氣以護之宜時常行動令血氣流胞胎活動若久坐久臥血凝氣滯則難産常見田家勞碌之婦其産甚易可知也一因奉養胎之肥瘦氣通於母恣食厚味以致胎肥難産常見荊布之女容易産可證也一因淫恣古者婦人有孕即居別室不共夫寢若有孕而犯之三月以前常知胎産小産三月以後犯之一則胞衣太厚而難産再則子身多濁物而不壽三則子出胞衣即多瘡毒出痘多細密難起以致少亡皆由父母欲火所結可悲也一因憂疑今人不講生産之理或問禍福於鬼神禱求於卜筮或聞里中有産厄者孕婦疑則懼懼則氣怯故難産一因軟怯如少婦初産神氣怯弱子戶未舒便腰曲不伸輾轉傾側兒不得出又中年婦人生育既多血氣虛耗産甚艱難須胎前服補氣養血之藥調理健壯則臨産自無慮矣一因愴惶將産之時有等愚蠢穩婆不審正産與轉胎但見腹痛遂用努力催生産婦聽從以致橫生一因虛乏臨産用力太早及兒欲出無力以送是以難産此時宜服人參接力則産矣
