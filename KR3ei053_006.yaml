body:
  text: 卷四產後諸症新產危急醫方產後五急症醫方新產十九危症醫方新產危急醫方加參生化湯治產後危急諸症此方雖有血塊可服當歸四錢川芎二錢乾薑四分桃仁十粒去皮尖研炙甘草五分人參二三錢隨症緩急如危症參加五六錢分娩兒下血崩暈去形脫宜服此方原方加減法娩兒下汗多倦甚加參三四錢娩兒下無力送胞倦怠宜服此方胎前患瀉產後倦怠宜服此方加參三四錢汗多加麻黃根一錢黃耆一錢防風五分足厥冷加人參四五錢附子四分氣短促加人參四錢渴加麥冬一錢五味子十粒大便實加肉蓯蓉一錢煩渴加竹肉一丸寒渴加杏仁十粒桔梗五分痰加天花粉八分竹瀝半盅薑汁少許凡產後血塊痛生化湯為主血塊痛散散痛止也加參生化湯為主產後五急症醫方倍參生化湯治產後五急症視症加減用之當歸五錢川芎二錢炮姜四分桃仁十粒人參三四錢炙甘草四分棗引一娩兒下即昏暈形色脫倍參生化湯加荊芥五分參倍至五六錢二產後勞倦形色脫倍參生化湯參加至四五錢黃耆一錢熟地二錢如血塊痛二味切不可用加熟附四分三產後血崩形色脫倍參生化湯參加至五錢荊芥穗四分炒如血塊散可服升舉止血復神湯白朮二錢當歸二錢熟地二錢人參四錢黃耆一錢黃連七分炙甘草四分升麻四分陳皮四分白芷四分荊芥穗四分附子三分棗引水煎四產後汗多形色脫倍參生化湯減炮姜加麻黃根一錢棗仁一錢黃耆一錢熟地三錢浮小麥十五粒防風五分塊痛未消切不可用地耆術三味五產後氣短似喘倍參生化湯加人參三錢磨沉香二分陳皮三分香附三分以上五症兼見雜症照後加減治法須以倍參生化湯為主渴加麥冬一錢五味五粒驚悸加棗仁三錢益智一錢瀉加白茯苓一錢澤瀉八分大便燥加肉蓯蓉一錢五分傷飯面加炒神麯八分傷肉加砂仁五分山楂五粒小便不禁加益智六分寒嗽加杏仁十粒桂枝五分痰加天花粉八分橘紅一錢虛嗽加天冬一錢五分蔞仁八分氣虛瘦加竹瀝半盅薑汁少許食少加白朮二錢新產十九危症醫方加參生化湯照後諸症加減法治之川芎一錢五分當歸三錢乾薑五分甘草五分桃仁五分加人參二三錢一產後勞倦傷脾不理穀食加參生化湯加白朮三錢血塊未清不可妄用陳皮四分升麻四分棗引水煎二產後頭痛身熱自汗倦怠加參生化湯加黃耆一錢麻黃根一錢地骨皮一錢白芷四分防風四分羌活四分三產後感寒身熱頭痛嗽聲重有痰有汗加參生化湯兼雜症照後開加減治之嗽加麥冬一錢杏仁一錢花粉一錢桔梗三分汗加麻黃根一錢地骨皮一錢如頭痛甚加連須蔥頭三個四產後先寒後熱或潮熱夜熱每日夜時而發類瘧疾有汗加參生化湯加軟柴胡八分青皮三分烏梅二個汗多加麻黃根一錢汗多不至足加熟地二錢食少加黃耆一錢五分白朮一錢五分陳皮四分慎不可用常山飲四獸飲青皮飲萬安甲子飲五產後妄言妄見加參生化湯加棗仁一錢茯苓一錢柏子仁一錢橘紅四分遠志肉一錢麥冬五分六產後足冷發厥一日三四次加參生化湯加白朮二錢熟地一錢熟附四分七產後身熱有汗大便不通加參生化湯加麻黃根一錢麻仁二錢地骨皮二錢肉蓯蓉二錢慎不可用大黃方八產後身熱有汗脅痛或潮熱加參生化湯加麻黃根一錢桂枝七分黃耆一錢柴胡七分臍下痛可按止加熟地二錢慎勿用小柴胡湯九產後有汗大便不通潮熱睡中妄言加參生化湯加麻黃根一錢棗仁八分地骨皮八分十產後有汗小便多加參生化湯加麻黃根麥冬五味葛根黃耆十一產後有汗泄瀉加參生化湯加麻黃根肉果一個麵裹去油石蓮子十個十二產後有汗泄瀉危困宜服丹溪醫案大補方人參三錢白朮五錢川芎一錢當歸三錢芍藥一錢茯苓一錢澤瀉八分厚朴五分陳皮四分紫蘇五分腹皮六分蘿蔔子六分木香七分十三產後大便不通誤食大黃方成膨脹宜服丹溪醫案補方十四產後傷寒誤食耗藥成膨脹宜服丹溪醫案補方十五產後忿怒誤食耗氣方宜服丹溪醫案補方治產後誤下誤消誤耗三症人參三錢白朮三錢川芎一錢芍藥一錢茯苓一錢當歸三錢澤瀉八分厚朴五分紫蘇五分陳皮五分木香三分腹皮六分蘿蔔子六分炒傷飯面加神麯麥芽傷肉加砂仁山楂傷怒氣加磨木香大抵產後虛弱誤下誤消誤耗犯虛虛之戒丹溪大補氣血方屢試屢驗胎前臌脹亦可奇效十六產後傷食痛或脅痛誤服消導藥方多絕穀食獨參三錢姜一片水煎調飯鍋焦漸漸引開胃氣此名長生活命飲十七產後血崩日久不止宜升舉大補湯白朮二錢當歸二錢懷生地二錢蒸人參二錢荊芥五分陳皮四分甘草四分黃柏三錢川芎一錢黃耆一錢麥冬一錢黃連三錢防風五分羌活五分升麻五分白芷五分水煎十八產後子宮不收產戶不閉脫症並宜服倍參生化湯十九產後神昏形脫有汗宜服倍參生化湯內減乾薑忌蔥姜以上十九危症並補氣血為主問無血塊痛惡血清楚方可服若惡血塊痛切不可用地耆術等補味慎之慎之其骨皮柴胡芍藥黃柏黃連生地皆寒涼凝血之物必須去產日久問無塊痛方可服
