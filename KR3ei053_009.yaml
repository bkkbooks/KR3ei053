body:
  text: 卷七上産後論解三十二症醫方生化湯凡孕至七個月照方預買川芎二兩當歸五兩桃仁五錢炙甘草五錢乾薑五錢就制下至胞衣一破速煎一帖候兒生下即服不問正産半産俱宜服兩帖消塊生血每帖川芎三錢當歸八錢甘草五分乾薑四分桃仁十粒去皮尖炒水二盅煎七分加酒六七匙稍熱服渣留後帖並煎兩帖共三煎要在一時辰內未進食之先繼相頻服則下焦血塊速化新血驟長自無暈厥且産婦多服一帖漸增精神不厭藥之頻也若照常症一日服一帖豈能挽回將絶之氣血也若胎前素弱虛人一見危症墮胎要不拘帖數服至病退止藥若産婦勞甚血崩形色脫加人參三四錢在內頻灌無虞若汗多氣促亦加人參三四錢在生化湯內血塊無滯一論血塊婦人病倍於男子因産之症偏多也夫産後血塊醫家所當先論毋視為輕而忽之也因古局方偏用蘇木蓬稜峻攻塊痛反損破新血而重虛産婦俾後學世相授受信用誤人不知幾千年矣無異於刃之殺人也故特書列首章普告事産者勿視血塊症輕而妄用蘇木蓬稜以輕人命也一應散血方破血藥雖山楂性緩不可單用俱害人性命者也生化湯治血塊娩後化舊生新之聖藥也又加益母丸鹿角灰就用生化湯送一錢外用烘熱衣服暖和塊痛處雖暑月亦要和暖大抵産婦勞傷氣血並虛娩子後無力送胞送塊留滯腹中作痛甚有氣不運而昏迷暈厥切不可妄論惡血搶心妄用蘇木等散血之劑以殺人也只頻服生化湯幾帖即時塊消痛止神清氣復而頓爽舒暢平安矣行血如生地牛膝敗血如三稜蓬朮俗用山楂沙糖消塊薑椒艾酒定痛多致淋崩昏暈等症二論血暈凡分娩之後眼見黑花頭眩昏暈不知人事謂之血暈其因有三一因勞倦甚而氣竭神昏二因血大脫而氣欲絶三因痰火乘虛泛上而神不清患此三者皆魂不隨神往來機運而幾息也當急服預煎下生化湯以行塊定痛化舊生新即時血生氣轉神漸清而心有主頻服二三帖完其昏亂即定乃芎歸性有化生之功也若偏信古方認暈症為惡血搶上迷心而輕用散血之劑認謂痰火而治以降火清涼之方誤之甚也外以醋韭沖鼻之法燒漆之方亦不可緩醫者不可妄論惡血上搶心而用蘇木等以峻攻新血又不可信用古方用牡丹奪命之方以敗血而反損人之命也再叮嚀臨産之際必用預煎生化湯預燒硬石子稱錘候兒下地連服兩三帖藥共三煎又産婦枕邊用醋韭投錘子瓶之法決無暈症又兒生下時舉家不可喜子慢母産母亦不可顧子忘倦又不可産訖即臥或忿怒氣逆皆要血逆致暈至囑附方於後加減生化湯治産後三等血暈川芎三錢當歸六錢乾薑四分桃仁十粒炙甘草五分荊芥五分棗引水煎加減法勞倦昏而甚及血崩氣血脫而暈並宜速灌生化湯兩帖如形色脫或汗多而脫皆用急服一帖後即加人參三四錢肉桂四分決不可疑參為補而緩服又痰火乘虛泛上而暈方內加橘紅四分虛甚亦可加參二錢肥人多痰再加竹瀝七分酒盞薑汁少許以上三等暈症並不可用蘇木破血等藥其血塊痛甚兼送益母一法或送鹿灰或元胡索或用獨行散以上消塊方服一方見效不須易方從權救急加參生化湯治産後形色脫暈或汗脫暈川芎二錢當歸四錢乾薑四分桃仁十粒炙甘草四分人參三錢水煎服血塊痛甚加肉桂七分渴加麥冬一錢五味子十粒汗多加麻黃根一錢如塊不痛加黃耆一錢以止汗傷飯面加炒神麯八分麥芽五分傷肉加山楂五分砂仁四分人參補而行耆朮補而不行故産後七日血塊未除寧用人參不可用耆朮地豫見庸醫用此致心腹痛而斃三論産後厥症凡産用力過多勞倦傷脾孤臟不能注於四旁故足冷而厥氣上行焉經云陽氣衰於下則為寒厥是也非急方不能舉氣以歸源非大補不能回陽而復神豈錢數歸參照常症一日一帖所能扶救將絶之氣血耶必用加參生化湯倍參連服兩帖斯氣血旺而神復厥自止矣若服藥而有渴另用生脈散多參以代茶助津以救臟燥也此經驗之確論毋得有議焉雖又有四肢逆冷瀉痢症類傷寒陰症又難用四逆湯亦必用倍參生化湯佐以炙姜或附子一片則可回陽止逆又可以行參歸之功矣經云脾孤臟也四旁心肝肺腎也又云身體勞苦傷於脾又云厥氣上行滿脈去形立二方分先後加參生化湯治新産發厥塊痛未止不可加耆朮川芎二錢當歸四錢乾薑四分甘草四分人參二錢桃仁十二粒水煎連服二帖滋榮益氣復神湯治産後發厥問無塊痛可服此方川芎一錢白朮一錢黃耆一錢人參三錢當歸三錢懷熟地二錢炙甘四分麥冬一錢五味子十粒陳皮四分附子五分水煎汗多加麻黃根一錢棗仁一錢大便不通加肉蓯蓉二錢大抵産後暈厥二症相類皆氣血並竭神將去而機幾息僅有一絲之生意耳若非急方急服豈能挽回將絶之元氣耶但暈在臨盆急症尤甚子厥宜並灌生化湯幾帖先補氣血之虧即時塊化血旺而神清暈止産婦有精神矣若無汗脫形脫氣促症見參耆不須加也厥症在分娩之後氣血兩竭宜用倍參生化湯並補氣血之虧止厥以復神焉又非偏補血分可治愈要知暈有塊痛耆朮未可遂加厥證問無塊痛耆朮地黃並用無疑也四産後血崩産後血大來宜審血色之紅紫視形色之虛實如血多色紫有塊乃當去之敗血也若止留反作痛不可論崩如鮮紅之血大來乃是驚傷心不能主怒傷肝不能藏勞傷脾不能統血歸經耳當以崩論先服生化湯幾帖則行中有補而血寧生旺矣若崩形脫或有汗或氣促宜倍參生化湯以益氣斯陽生而陰血生旺矣非棕灰之可止者如産半月後崩又宜升舉大補湯治之方載八卷中生化止崩湯治産後血崩川芎一錢當歸二錢去尾乾薑四分炙甘草五分桃仁十粒荊芥五分炒棗引水煎忌薑椒熱物生冷鮮紅血大來加荊芥穗一錢炒白芷五分血塊不痛形脫加人參三錢汗多氣促加人參三四錢無汗形不脫氣不促只多服生化湯則血自寧勿言芎歸活血助崩誤矣滋榮益氣止崩湯川芎一錢麥冬一錢黃耆一錢人參一錢白朮二錢熟地二錢當歸二錢白芷四分荊芥穗四分陳皮四分甘草四分升麻四分黃連三分棗引水煎汗多加麻黃根一錢浮小麥一撮大便不通加肉蓯蓉一錢有熱加磨木香一分痰加貝母六分竹瀝薑汁寒嗽加杏仁一錢桔梗一錢知母一錢驚悸加棗仁一錢柏子仁一錢傷飯面加神麯一錢麥芽一錢傷肉加山楂一錢砂仁八分自熱不可用芩連柏大便不通禁大黃傷食怒氣不可單用消耗無補藥凡年老虛人患崩宜用升舉大補湯方詳八卷中五産後氣短似喘産後陰血暴竭陽氣無所依獨侵於肺故喘也此為孤陽絶陰最為難治凡産後血脫勞傷之甚氣短似喘無所倚恃而呼吸息止違常矣世有妄論痰火用散氣化痰之方誤人致夭多矣夫肺受脾稟運氣生脈通水道順呼吸清肅上下調和榮衛而為平人之常氣也值産血亡氣脫呼吸短促言語不相接續似喘危症不待診問自明不待智者而後知也加減生化湯治分娩兒下即患氣短症有血塊不加耆術川芎二錢當歸四錢炙草五分乾薑四分桃仁十粒人參二錢棗引水煎連服二三帖然後可服續氣養榮湯續氣回陽湯治産後氣短促問無血塊痛宜服此方川芎二錢當歸四錢炙草四分人參三錢黃耆一錢白朮二錢陳皮四分熟地二錢如足冷加熟附五分汗多加麻黃根一錢浮小麥一撮渴加麥冬一錢五味子十粒大便不通加肉蓯蓉一錢麻仁一撮傷飯面加神麯一錢麥芽五分傷肉加山楂五粒砂仁五分又服滋榮益氣復神湯方詳八卷中六産後妄言妄見凡産後妄言妄見由氣血虛而神魂無倚也夫心藏神主血而言乃心之聲也心有血而神存則言不妄發又肝藏血而藏魂而目乃肝之竅也目得血而司視則瞳瞭視正若夫産後血氣暴竭致心神失守言語無倫肝魂無倚則瞳瞭妄見況心為一身之主目為百脈之宗虛症見於心目則十二官各失其職矣是以視聽言動皆由虛妄治法當論産期塊痛有無緩急若娩兒之後塊痛未除先服生化湯三帖以化塊定痛服藥痛止即繼服加參生化湯或補中益氣湯加安神定志湯丸調治之也若産日久形氣血氣俱不足即當大補為主生養氣血安神定志服至藥力充足其病全愈病家毋救速效醫家毋論邪祟若噴以法水驚以法尺多致不救屢治此病服藥十數帖方效一婦妄言妄見服補劑十五帖方見效丹溪云虛病猶似邪祟也又云欲泄其邪先補其虛先調其氣次論諸疾此古人治虛弱人有挾外因內之確論但人不能體認其議用藥反言攻補難同於方愚人必攻邪盡方可用補病家不信難補此醫家治産後虛症及年老人虛喘弱人妄言三症所當用心也寧神生化湯治産後血塊痛未止患妄言症未可加耆術川芎一錢當歸三錢炮姜四分炙草四分桃仁十二粒茯神一錢人參二錢益智仁一錢炒柏子仁一錢陳皮三分棗引水煎服滋榮益氣復神湯治産後塊痛止可服此方川芎一錢當歸二錢熟地二錢炙甘四分黃耆一錢白朮一錢人參二錢茯神一錢棗仁二錢柏子仁一錢益智一錢炒陳皮三分麥冬一錢五味子十粒蓮子八個龍眼肉八個棗引大抵産後患崩曰血脫短氣似喘曰氣脫妄言妄見曰神脫三症雖有陰血氣陽之分其精散神去之促無異前暈症治若少緩亦危症也若非厚藥急方頻服失之夭者多矣誤論氣實痰火皆非也若新産有塊痛並用加參生化湯行中有補斯免滯血血虛之失也其塊痛止宜升舉大補方少佐以黃連墮火以治崩脫寧血歸經也用倍參補中益氣湯少佐以附子助參以治氣脫攝氣歸元也宜滋榮益氣復神湯少佐痰劑以清心火治神脫寧君主之官也余因人妄論氣脫妄言等症誤用氣實痰方藥屢夭人年重復録告凡遇氣胎痰重之症必當補救切不可用消散誤人以受夭殃七産後傷食凡産形體勞倦脾胃俱傷胃受食傷不受穀味是以新産之後禁膏粱遠厚味食粥茹蔬乃切務也不善調攝之家惟慮産婦之虛以多食有益厚味為補本不思食而強與饜足胃受食傷不受穀食脾轉輸遲食停痞塞噯酸惡食治當扶元為主溫補氣血健助脾胃養正兼消審傷何物佐以消導斯脾氣復而轉輸散精滯物行而胃始思谷夫飲食者元氣之滋味而産後尤藉此以補助也因勞倦傷脾不勝甘飫薄味漸進運化亦速再兼服溫補之劑佐以神麯麥芽消面飯之傷山楂砂仁消肉食之傷如傷寒冷之物吳茱萸桂枝亦當加也如此補消並治無有不安屢見治重産虛弱惟知速消傷物反損真氣益增滿悶一帖不效又加峻藥一醫無功又更一醫先後方類輕症增重致使少食思谷之人反虛虛而絶不思谷者十常八九病家自歸數命醫家以為盡技惜哉加味生化湯治産後血塊未消服此消食川芎二錢當歸五錢乾薑四分炙甘草五分桃仁十粒傷面飯加神麯一錢麥芽一錢炒傷肉加山楂五粒砂仁五分傷寒物脅痛加吳茱萸一錢肉桂五分虛甚加人參二錢二服健脾消食生化湯治産後血塊痛除服此方以消食川芎一錢當歸三錢炙甘五分人參二錢白朮一錢五分神麯一錢麥芽五分傷肉加山楂五粒砂仁六分傷食不用白朮用參如停寒日久脾胃虛弱雖藥不運宜揉按炒麵尉之長生活命丹治傷食人誤服消導藥多絶粥幾日者宜服此方雜症誤消耗絶食亦神效人參二錢水盅半煎至半盅之數先用一酒盞之則送飯鍋焦研粉三匙漸漸加參湯鍋焦引開胃氣煎參湯須用新罐或銅勺恐聞藥氣要嘔觀醫案信方不誣人參名長生草飯鍋焦名活命丹此方曾活數千命經驗極多故有至三至再之囑耳八産後忿怒凡産婦因忿怒氣逆胸膈不舒血塊又痛宜服生化湯臨服時磨木香二分在內則血塊自化怒氣自散並治而不悖也若輕産重氣偏用香附烏藥枳殼香砂之類以散氣行塊則元氣反損滿悶益增此非善治産也又如怒後即食胃弱悶停當審何物加山楂砂仁以消肉傷加神麯麥芽以消飯傷若傷寒物作痛留滯脅腹加桂枝吳茱萸在生化湯內以逐寒定痛無有不安慎勿木香檳榔丸流氣飲之方以散氣化食是虛弱産婦重虛之禍有不可勝言者也木香生化湯治産後血塊痛未除又受氣宜服此方川芎二錢當歸六錢乾薑四分炙甘草五分木香二分陳皮三分此方減桃仁而用木香陳皮前有減乾薑者詳之健脾化食散氣湯治産後受氣傷食問無血塊痛可服白朮二錢當歸二錢川芎一錢乾薑四分陳皮三分砂仁七分如寒停脅下作痛加桂枝八分大抵産後弱婦受氣停食愈消愈增滿悶必攻補兼行方化滯進食但時醫所見知耗氣而疑參補誤人多矣余屢見誤服散氣消導藥致使少食思谷之人反絶食日久者亦用長生活命丹而活甚多大抵産後忿怒氣逆及停食二症善治者重産而輕怒食必補氣血為主佐以順氣調氣則怒郁散而元氣不損佐以健脾消導非惟氣順則停食亦行而胃思谷此治産後怒傷食傷之正法也若專理氣消導脹不散停食不行且損元減食甚至絶谷不救者多矣惜哉九産後類瘧凡産後寒熱往來每日應期而發其症類瘧切不可以瘧痰疾方藥治之夫氣血虛而寒熱交作元氣弱而外邪或侵雖寒來復栗湯火不能溫熱如燔炙冰水不能寒或晝輕夜重或日晡寒熱雖所見症與瘧類同其方藥必當滋榮益氣以退寒熱有汗急當止汗如麻黃根湯等藥若頭有汗而不及手足乃孤陽絶陰之危症也當加地黃當歸之劑如感寒頭痛無汗宜於生化湯內加羌活防風蓮鬚蔥頭以散之慎不可作瘧治以誤人也柴胡湯青皮飲常山草果等方藥俱不可用麻黃根湯麻黃根當歸黃耆炙甘草人參桂枝白朮牡蠣浮小麥凡婦人産後患類瘧疾頭有汗身足無者偏服參少血分藥多不救滋榮益氣扶正湯治産後寒熱有汗每日午後應期而發川芎一錢當歸二錢炙草五分人參二錢生熟地二錢黃耆一錢陳皮四分去白麥冬一錢白朮一錢五分麻黃根一錢五分夜服六味地黃丸每服七八十丸清湯下加減養胃湯治産後寒熱往來頭疼無汗類瘧川芎一錢當歸三錢藿香四分炙草四分茯苓一錢蒼朮一錢人參一錢五分半夏八分橘紅四分姜引痰加竹瀝薑汁半夏曲弱人兼服河車丸産後久瘧無汗不愈兼煎白朮人參膏以助藥力十産後類傷寒二陽症産後七日內外發熱頭痛惡寒毋專論為傷寒太陽症發熱頭痛脅痛毋專論為傷寒少陽症二症皆由氣血兩虛陰陽不和而類外感治者慎勿輕産執偏門而用麻黃湯以治類太陽症又用柴胡湯以治類少陽症蓋産婦血脫之後若重發汗則虛虛之禍有不可勝言者也昔仲景云亡血家不可發汗丹溪云産後不可發表二先生非謂産婦真無寒之兼也非謂麻黃柴胡之不對症也誠恐後執偏門而輕産執成方而發表也雖明知産後真感風寒其生化湯內芎姜亦能散之又內經云西北之氣散而寒之東南之氣收而溫之所謂同病而異治也其謂東南方人柔弱而西北方人剛徑故治病有異也雖産後勞虛治不可分南北須當重産而用補少佐以散劑雖有他症以末治之不可不明也加味生化湯治産後三日內發熱頭痛川芎一錢五分當歸三錢炙草四分炮姜四分桃仁十粒羌活四分防風四分服二帖若頭痛身熱不除加白芷八分細辛四分若頭痛如破加蓮鬚一錢蔥頭五個虛加人參二錢産後類傷寒三陰症潮熱有汗大便不通毋專論為陽明症口燥咽乾而渴毋專論為少陰症腹滿液干大便實毋專論為太陰症又汗出譫語便祕毋專論為腹中有燥屎宜下數症多因勞倦傷脾運化稽遲血氣枯竭腸腑燥涸乃虛症類實當補之症治者毋偏門輕産而妄議主承氣湯以治類三陰之症也間有少壯之人患此類症妄下僥幸無妨但産後虛弱而復誤下虛虛之禍不可勝言屢見妄下成噎誤導反結又言少血致便不通而誤下泄瀉不止者甚多養正通幽湯治産後大便祕類三陰傷寒症川芎一錢五分當歸六錢炙甘五分桃仁十五粒肉蓯蓉一錢酒洗去甲陳皮四分麻仁一錢汗多便實加黃耆一錢麻黃根一錢口燥渴加麥冬一錢腹滿液干便實加麥冬一錢人參一錢蓯蓉一錢汗多譫語便實乃血氣並竭神衰心主失守宜養榮安神加茯神一錢棗仁一錢遠志一錢柏子仁一錢白朮二錢人參一錢黃耆一錢以上等症大便燥結並宜大料川芎當歸補血人參可少芎歸非至斤數難以取效大抵産婦虛中傷寒口傷寒食外症雖見頭痛發熱或脅痛腰痛似外感宜汗猶當重産亡血禁汗惟宜生化湯中量而加減調治之無失又如大便結祕猶當重産其亡血禁下惟宜養正助血通滯極穩當也又方潤腸粥産後日久大便不通用芝麻一升研末和米二合煎粥食即通十一産後類中風産後氣血暴竭百骸少血濡養率而口噤牙緊手足筋脈攣縮類中風又類痓癇雖虛火泛上有痰皆當以末治之毋執偏門而用治風消痰之方以重虛産也蓋經脈任血流利自筋骨強健而關節清利今産後無血濡注致牙緊口噤手足牽搐症類痓癇中風也治當先服生化湯以生旺新血如見危症三帖後即用人參益氣以救血脫也如有痰有火少佐橘紅炒芩之劑竹瀝薑汁亦可加之黃連黃柏不可並用慎之附方於後滋榮活絡湯治産後少血口噤項強抽搐類中風症此方如有血塊不可用地耆術川芎一錢五分當歸三錢懷熟地二錢草果四分黃耆一錢茯神一錢天麻一錢人參二錢麥冬一錢陳皮四分荊芥四分防風四分羌活四分黃連二分姜炒有痰加半夏曲二錢竹瀝一小酒杯薑汁少許有食加山楂砂仁以消肉物神麯麥芽以消面飯大便祕加肉蓯蓉一錢五分渴加麥冬葛根汗加麻黃根一錢驚悸加棗仁一錢天麻丸治産後中風恍惚語澀四肢不利天麻五錢防風五錢茯神一兩川芎七錢棗仁一兩羌活七錢人參一兩遠志一兩柏子仁一兩山藥一兩麥冬一兩細辛四錢南星曲九錢半夏曲九錢當歸六兩石菖蒲八錢蜜丸硃砂為衣十二産後汗凡分娩時出汗由勞傷脾驚傷心恐傷腎也內經云身體勞苦汗出於脾驚而奪精汗出於心胃所恐懼汗出於腎産婦多兼三者而汗出不須即加斂汗之劑神寧汗自止息其血塊作痛耆術未可遽加宜服生化湯二三帖後塊痛消即繼服加參生化湯以止虛汗若分娩後倦甚濈濈然汗出形色有脫乃亡陽脫汗也又當從權連灌加參生化湯倍參以救危急毋據塊痛夫汗乃心之液榮於內為血發於外為汗産婦值亡血之後多汗由驚勞心傷神虛不能鎮守其液也治當健脾胃而救水穀之精歸脾益榮衛而引血歸源灌溉四旁不使妄行為外汗也難症雖有自汗盜汗之分其當歸大黃湯不可治産後之盜汗也並宜服加參生化湯及加味補中益氣二方若服參耆重劑而汗多不止及出頭汗而不及腰足乃危症也麻黃根湯治産後虛汗不止三日內血塊未淨不可加耆術黃耆一錢五分當歸二錢麻黃根一錢粉甘草五分人參二錢牡蠣五分桂枝五分浮小麥一撮白朮一錢血塊痛不加者以耆術補而不行也虛脫汗多手足冷加熟附一片乾薑四分渴加麥冬一錢五味子十粒血塊不痛加熟地三錢惡風寒加防風五分桂枝五分肥白人産後多汗加竹瀝一酒杯薑汁半匙以清痰火晚服八味地黃丸山萸肉山藥茯苓澤瀉牡丹皮五味子黃耆懷生地各等分為末蜜丸凡産後虛汗不止由産亡陰血而陽氣偏盛故也內經云陽加於陰則發汗因而遇風變為痓瘲者有之十三治産後盜汗産後睡中出汗醒來即止猶盜瞰人睡而上盜故謂人盜汗非自汗所同治當兼用血藥品其當歸大黃湯又非産後盜汗藥方也止汗散治産後盜汗人參二錢當歸三錢麻黃根一錢五分懷熟地三錢黃連五分酒炒浮小麥一撮又方牡蠣煅研細末小麥麵炒黃為末絹袋盛撲之十四産後口渴或兼小便不利凡産後口燥咽乾而渴或兼小便不利由産失血或汗多所致是無水穀也夫日用水穀胃納而脾肺散之至精清氣為津為液其氣通心受火色而方化為血下行膀胱而為小便值産亡血而又多汗又勞倦傷脾不能為胃行其津液則是化生之氣不運滲泄之令不行是以上無津液流通而有咽乾燥渴之症下氣不升而有胃腎關閉之候治法必當助脾益氣升補氣血則氣化流行陽升陰降斯水入經而為血為津谷入胃而氣長脈行自然津液充而便利調矣若認咽乾口燥為火而用芩連梔柏以降之若認小便澀閉為水滯而用五苓等散以通之皆非也必因其勞損而溫之益之因其乾燥而濡之行之度量病情而治之庶無失也生津止渴益水飲量加車前子一錢黃耆一錢人參三錢懷生地三錢麥冬三錢五味子十粒當歸三錢茯苓八分甘草四分升麻四分葛根一錢汗多加麻黃根一錢棗仁一錢浮小麥一撮大小便日久不通加肉蓯蓉一錢五分渴甚生脈散代茶不可疑而不用生津益液湯治産後虛弱口渴少氣汗多內煩不生津液人參一錢麥冬一錢茯苓一錢大棗三枚竹葉三十片甘草五分栝蔞根三錢荊芥三錢當歸三錢大熱大渴不止加蘆根水煎神效十五産後類痓産後汗出多而變類痓症口噤不開背強而直身反氣息如絶系失血亡汗感風所致宜速服加減生化湯少加風藥陰服則陽自和血行則風自滅切不可純用風藥致血燥益甚筋失所養成不治也加減生化湯川芎當歸麻黃根桂枝防風甘草羌活附子人參天麻羚羊角又方治産後無汗類痓中風筋脈四肢攣急川芎當歸羌活防風棗仁此血虛之故當重用芎歸十六産後瀉産後泄瀉非如雜症有飧泄濡泄洞泄水穀注下之論大率屬氣虛食積有濕也氣積宜補食積宜消脾濕宜燥然惡露未消驟難峻補消燥當先服生化湯兩三帖以化生新舊之血內加茯苓以利小便俟血化生然後補氣消食燥濕而分利水道始無滯澀虛虛之失若虛旬日外方論雜症猶量人虛而治如痛下清水腹鳴米飲不化以寒泄治之糞色赤黃肚門痛祕以熱泄治之有因飲食過多脾傷成瀉自有噯氣臭如敗卵又有脾氣久虛少食食下腸鳴腹急盡下所有之物方覺快者其症各異其治法寒則溫之熱則清之脾傷食積分利健脾兼消兼補以虛為本斯為善調治者也丹溪治産後虛瀉眼昏不識人危症用白朮三錢人參七錢茯苓三錢附子一錢水煎加減生化湯治産後血塊未消服此方川芎二錢當歸四錢炮姜四分桃仁十粒炙草五分茯苓二錢蓮子八個健脾利水生化湯治産後血塊已消服此方當歸二錢川芎一錢乾薑四分茯苓一錢五分人參三錢肉果一個制白朮一錢泔水浸陳皮五分澤瀉八分寒瀉加乾薑八分寒痛瀉加砂仁八分乾薑四分熱瀉加黃連八分酒炒水瀉腹痛米飲不化加砂仁山楂麥芽瀉有酸腐臭氣加神麯八分砂仁八分山楂麥芽五分脾氣久虛瀉出所食之物方可快者以食積論加山楂麥芽神麯砂仁脾氣弱元氣虛産勞甚必大補佐消食佐消熱佐祛寒弱甚形色脫必用丹溪參苓朮附方大補始可回生也久瀉加升麻諸瀉加蓮子十個次煎取送藥瀉水多者加蒼朮一錢以燥之十七産後完穀不化産後完穀不化者因産勞倦脾傷而轉輸稽遲也夫水穀入胃必因於脾方散於肺而通調水道乃能布氣四臟以養人今産勞倦脾傷故失轉輸之職致沖和之氣不能化而冷物完出也病名飧泄又飲食太過脾胃受傷亦致完穀不化俗呼為水穀痢也然産方三日內血塊未散患此脾敗胃弱症未可遽加耆術宜服生化湯加益智香砂以少溫胃氣俟血塊消散可加人參耆術以補氣肉果木香砂仁益智以溫胃柴胡升麻以引胃中清氣澤瀉陳皮茯苓以利水為上策也加味生化湯治産後三日內完穀不化胎前人素弱患此症用川芎一錢當歸四錢炮姜四分桃仁十粒益智二錢茯苓一錢五分參苓生化湯治産後血塊散可服此補方川芎二錢當歸二錢炮姜四分炙甘五分白芍一錢益智一錢炒茯苓一錢人參二錢白朮二錢蓮子八個肉果一個制瀉水加澤瀉八分木通八分加減法腹痛加砂仁八分渴加麥冬二錢五味子十粒水瀉寒加乾薑一錢木香四分食積黃色加神麯二錢麥芽二錢以消麵食砂仁二錢山楂五粒以消肉食若瀉痢日久胃氣虛弱完穀不化宜溫助胃氣六君子湯加木香五分制肉果一個十八産後痢産後七日內外患赤白痢疾後重頻並為最難治欲調氣行血而推蕩痢邪則慮産後之元氣正虛欲滋榮益氣而大補虛弱又恐助痢邪之初盛其行不損元補不助邪惟生化湯減乾薑而代木香茯苓則善消惡露兼行痢積並行而不悖也再服加味香連丸以俟二三日後現病勢加減可保無慮若産七日外有患褐色後重頻並虛痢即當加補無疑若産婦稟厚産期以及二十餘日可用生化湯加芩連厚朴芍藥行積之劑加味香連丸以治之加減生化湯治産後七日內外患痢川芎二錢當歸二錢炙甘草五分桃仁十二粒茯苓一錢陳皮四分木香二分磨白痢腹痛加砂仁六分清血丸治紅痢神方産七日內不可用寒性藥也香連丸香連為主加蓮肉粉各一半治噤口痢赤白痢下絞痛加行積藥産三四日後血塊散痢積少加減用照後開方治法方詳八卷一産後久瀉元氣下陷大便不禁肛門如脫宜服六君子湯加木香四分制肉果一個乾薑五分二産後瀉痢黃色乃脾氣久虛宜服補中益氣湯加木香四分肉果一個制三産後傷麵食瀉痢宜服加參生化湯加神麯麥芽四産後傷肉食瀉痢宜服加參生化湯加山楂砂仁五産後胃口虛弱患痢瀉完穀不化當溫助胃氣宜服六君子丸加木香制肉果一個六産後肝脾二氣俱虛瀉痢四肢浮腫宜服六君子湯加陳皮七産後瀉無後重但日久不止宜服六君子湯加肉果木香八産後赤白痢臍下氣痛用當歸厚朴黃連肉果甘草九産後痢久白痢不止屬血虛宜服四君子湯加荊芥人參十産後痢羸困心腹絞痛宜服薤白石榴皮當歸黃連地榆痢腹痛不止用溫湯蘸尉暖腹則緩十九産後霍亂産後霍亂由勞傷氣血臟腑虛損不能運化食物及感風冷所致陰陽升降不順清濁亂於腸胃冷熱不調邪正相搏上吐下痢名曰霍亂也生化六和湯治産後塊痛未除又患霍亂川芎二錢當歸四錢乾薑四分炙甘四分砂仁六分陳皮四分藿香四分茯苓八分姜引附子方治産後吐痢霍亂手足逆冷問無塊痛服此方白朮二錢當歸二錢陳皮四分乾薑四分丁香四分甘草四分人參一錢附子五分研細末粥飲調下二錢溫中散治産後霍亂吐痢不止無血塊痛可服人參白朮當歸厚朴乾薑茯苓草豆蔻姜引産後七日外患霍亂用六君子湯亦可治之二十産後嘔逆不食人之胃腑為水穀之海水穀之精化生氣血榮潤腸腑産後勞傷臟腑寒邪易乘入於腸胃則嘔吐氣逆而不下食也如脈弦滑多於傷食而嘔宜與傷食條參看加減生化湯治産後嘔吐不食川芎一錢二分當歸三錢乾薑四分炙甘四分砂仁五分姜引溫胃丁香散治産後七日外嘔逆不食當歸二錢白朮二錢乾薑四分丁香四分陳皮四分甘草四分前胡四分人參二錢藿香四分石蓮散治産後咳逆嘔吐心沖目眩石蓮子一兩二錢去殼白茯苓一兩丁香五錢為末米飲下二十一産後水腫有針刺法附卷七下末篇産後手足浮腫皮膚作光瑩色及脾虛不能制水腎虛不能行水必大補氣血為主佐以蒼朮茯苓白朮補脾壅滿加半夏陳皮木香香附監之虛人加人參木通有熱加麥冬黃芩以清肺火健脾利水補中益氣湯治産後七日外人參二錢白朮二錢茯苓一錢白芍一錢陳皮二分木瓜八分木通四分紫蘇四分蒼朮四分厚朴四分大腹皮四分大便不通加肉蓯蓉一錢麻仁一錢如因寒邪濕氣傷表無汗而腫宜服姜皮半夏蘇葉加於補氣血方以表汗五皮飲治産後濕氣客傷脾經氣血凝滯以致面目虛浮四肢脹氣喘用五加皮有以桑白皮代之大腹皮茯苓皮生薑皮水煎服二十二産後怔忡驚悸産後憂驚勞倦去血過多則心中躁動不寧謂之怔忡若惕然而驚心中怯怯如人將捕之狀謂之驚悸治此二症惟調和脾胃補氣血志定神寧氣舒心安而病愈矣如分娩後血塊未消宜服生化湯補血行塊血旺則怔忡驚悸自平不必加定安心神之劑如塊消痛止後患此症者宜服加減養榮湯加木香減川芎麥冬即歸脾湯加減養榮湯川芎一錢當歸二錢茯神一錢棗仁一錢人參一錢麥冬一錢白朮二錢遠志二錢去心黃耆二錢龍眼肉八個陳皮四分甘草四分姜引虛煩加竹肉一丸痰加竹瀝薑汁養心湯治産後心血不寧驚悸不安黃耆一錢當歸二錢茯苓八分川芎八分麥冬一錢人參一錢甘草四分遠志八分棗仁一錢柏子仁一錢五味子十粒姜引安神丸與前藥兼服黃連三錢酒炒懷生地三錢歸身五錢炙草五分為末蒸餅糊為丸如緑豆大硃砂二錢為衣每服四十九丸二十三産後骨蒸産後骨蒸由失血過多骨無血陰以致虛火作炎骨蒸作熱經云陰虛發熱是也如血塊未淨只服生化湯視症略為加減俾陰血旺升則火自歸經矣如塊痛已消宜服梅連丸柴胡梅連丸即清骨散作湯服甚效柴胡二錢胡黃連二錢前胡二錢烏梅二錢去核豬脊髓一條豬膽一個蔥白十根長一寸前四味為末另將豬髓膽蔥白同搗成泥入童便一盅熬