麥朴硝白礬五倍子白芨煎湯熏洗治婦人陰癢蛇床子白礬煎湯洗又方用牛肝或豬肝三寸納入陰戶久則取出之立愈治婦人陰中生瘡杏仁雄黃生礬各五錢麝香二分半共研末納入陰中即愈三十二産後癲狂産婦多喜多怒時發癲狂言語無倫甚有不顧身體此皆五志所發為熱火實制金不能平下則肝實而多怒也又發熱於中則屬陽明經謂陽明之厥則癲又謂服膏粱芳香等則熱氣剽悍發為癲狂大率因痰結於胸中宜開痰鎮心神為主又神不守舍狂言妄作久不愈如心經蓄熱當清心除熱為先如痰迷心竅當去痰寧心宜大吐下則愈産後身熱感風遍身麻痹手足牽搐口喎痰盛言語無倫乃痰結胸膈心經蓄熱之症當以歸脾砂香等湯歸脾湯橘紅膽星茯神杏仁人參當歸甘草半夏枳實川芎柏子仁五味子白朮圓眼砂香散人參木香砂仁黃耆山藥柏子仁茯神遠志棗仁上為細末蜜調服卷七下增補産後十二症發熱頭痛腹脹咳嗽厄逆惡露不下惡露不止眼見黑花頭眩脅痛不語言語含糊癥瘕發熱産後發熱非有餘之熱乃亡血過多陰虛則生內熱也其症心胸煩滿吸吸短氣頭痛悶亂晡時轉甚人參芎歸湯主之當歸一錢五分川芎一錢五分白芍一錢五分酒炒熟地一錢五分麥冬一錢乾薑一錢水兩杯先以粳米一撮淡竹葉十片煎至一杯去米葉入藥加棗三個煎七分服必加乾薑者因姜能入肺和肺氣入肝引血藥生血然不獨用必與補陽藥同此造化之妙惟天下之神者可以語此頭痛産後頭痛人身之中氣為陽血為陰陰陽和暢斯無病矣産後去血過多陰氣大虧陽無所附頭者諸陽之會邪湊於頭故為頭痛但補其陰血則陽氣得足病自止矣芎歸湯主之川芎三錢當歸六錢酒洗蔥白五錢蓮鬚生薑水煎服之又有敗血停留子宮厥陰之位其脈上貫巔頂亦能作痛前湯加生蒲黃二錢炒黑豆一合酒水各半煎腹脹産後腹脹滿悶因敗血散於脾胃脾受之則不能運化津液而成腹脹亦有停食而腹脹者以脈辨之因於血者則脈結澀不惡食因於食者脈必弦滑惡食平胃散加味主之蒼朮米泔浸去皮炒厚朴薑汁炒陳皮香附醋炒人參各二錢神麯一錢炒生薑五分炒傷食加山楂麥芽腹脹者未有不喘人參定喘湯主之人參陳皮杏仁甘草木香蘇葉咳嗽産後咳嗽肺主氣氣為動所以充皮毛密腠理者也産後氣虛皮毛不充腠理不密肺感風寒以致咳嗽其症發熱惡寒鼻塞聲重旋覆花湯主之旋覆花赤芍前胡半夏荊芥穗甘草白茯苓五味子杏仁桔梗枳殼等分薑棗引有汗加桂枝厄逆産後厄逆氣從胃中出上衝賁門厄忒作聲有胃氣虛寒者有中氣不足者有衝任之火直犯清道而上者有飲水過多水停而逆者有大小便祕下焦不通而氣上逆者皆虛極胃氣將絶也大約産後厄逆乃胃氣虛寒症多加味理中湯主之人參一錢白朮一錢炙甘一錢炮姜一錢陳皮一錢丁香五分乾柿蒂二錢竹肉引有熱去丁香惡露不下産後惡露不下此症有二或因子宮素冷停滯不行必小腹脹滿刺痛無時或因中氣本虛憊血少氣乏血阻不能盡下腹必乍痛乍止痛亦不甚加減八珍湯主之人參茯苓炙甘草當歸川芎元胡索酒炒香附醋製薑棗引痛無補法如腹痛者參宜斟酌惡露不止産後惡露不止因衝任損傷氣血虛憊舊血未盡新血不斂相併而下當大補氣血使舊血行而新血生不可輕用固澀之劑致敗血凝聚變為癥瘕成終身大患十全大補湯主之眼見黑花頭眩産後眼見黑花頭眩乃惡露不盡敗血流入肝經肝開竅於目故見黑花諸風振掉皆屬肝木故作頭眩清魂散主之人參一錢澤葉蘭一錢荊芥穗二錢當歸二錢川芎二錢炙甘八分丹皮一錢脅痛産後脅痛乃敗血流入肝經厥陰之脈循行脅肋故作痛芎歸瀉肝散主之歸尾二錢川芎二錢青皮二錢香附二錢枳殼二錢紅花二錢桃仁二錢水煎加童便酒各一杯服乳香膏治産後腰痛脅痛不可忍者皆有敗血流入二經以致作痛用乳香沒藥各五錢研細酒醋各一杯熬膏布攤貼不語産後不語此症敗血不盡停閉心竅神志不明故多昏憒心氣通於舌心氣閉故舌強不語七珍散主之人參二錢石菖蒲二錢生地二錢川芎二錢當歸二錢細辛六分水煎調辰砂五分言語含糊産後言語含糊並治怔忡凡心主血血去太多心血虛弱舌乃心之苗其血不能上榮乎舌萎縮卷短語之不出也加味生脈散主之人參一錢五分麥冬一錢五分五味子十五粒生地一錢歸身一錢炙甘一錢石菖蒲一錢獖豬心一個劈開水煎二盞半去心入藥煎七分若怔忡加辰砂三分服癥瘕産後癥瘕由惡露不盡脾氣虛弱失其健運之職故積而成形積之日久痰火與血日漸長大飲食減少人日羸瘦時發寒熱以補虛為主健脾消積丸主之人參白朮茯苓炙甘草半夏陳皮香附桃仁五靈脂浮海石元胡索三稜莪朮鬱金紅棗煮熟去皮核神麯米飲打糊為丸以上各症祕本不能盡載故從萬密齊先生女科中摘出以補未備但不可膠執湯頭惟在救病者臨時細察脈症詳審藥性愚見總宜遵丹溪先生生化湯為主然後見症加對病之藥施治百發百中萬無一失也産後大小便祕下身水腫狂語諸症醫方産後如患三陰傷寒大便不通其人譫語發熱脈沉實者大柴胡湯三承氣亦宜還用從權治救或其人如狂不至發狂者蓄血症也桃仁承氣湯主之因祕本無此二症故詳録之以為後學之津梁也大柴胡湯治身熱不惡寒反惡熱大便祕柴胡一錢五分黃芩一錢芍藥一錢半夏八分大黃七分枳殼四分薑棗引調胃承氣湯治病人邪在中焦不惡寒反惡熱譫語便祕嘔逆大黃六錢酒洗芒硝四錢甘草一錢水盅半煎八分去渣入硝一沸服此下劑稍重者不用枳朴恐傷上焦氤氳之氣也用大黃六錢炒厚朴六錢炒枳實二錢炒水二盅服此下劑之稍重者不用芒硝恐傷下焦之血也小承氣湯治病人六七日不大便腹脹滿潮熱狂言而喘是湯專瀉上焦之痞熱大黃厚朴枳實桃仁承氣湯治病人小腹急大便祕或黑小便不利中焦積血也桃仁十粒肉桂一錢去皮甘草一錢大黃一錢五分芒硝一錢五分水二盅煎一盅入硝一沸服大承氣湯治五六日不大便腹痛煩渴少陰口燥咽乾潮熱脈沉實三焦俱有邪大黃五錢芒硝四錢厚朴二錢炒水二盅先煎枳朴至一盅去渣入硝煎一沸服此下劑之最重者不可輕用産後有惡露久滯遂化為水以致發腫皮膚作光瑩色指捺成窠宜服五皮飲並健脾利水已見前二十一産後水腫中但下部大腫者藥力率不能到用銀針刺足跗足面孤拐小腿十數處流出蓄水令産婦下部舊棉衣鋪墊時時換易亦水甚則決之之義愚以意消息經治有驗故書此以告後學者
